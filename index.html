                    if (this.anims.exists('m-idle-left')) spr.play('m-idle-left');
                    this.eSprites.push(spr);
                }
                this.eSpr = this.eSprites[0];
            },

            _buildActionMenu: function(st) {
                if (this.btnGroup) {
                    this.btnGroup.forEach(function(c) {
                        c.destroy();
                    });
                }
                this.btnGroup = [];
                var sc = this;
                var g = this.gs;
                var actY = this.H - this.Z.ACT;
                var LP = this.Z.LP;

                function mkBtn(label, sublabel, x, y, w, h, col, bgCol, fn, disabled) {
                    var zone = sc.add.zone(x + w / 2, y + h / 2, w, h).setInteractive({ useHandCursor: !disabled }).setDepth(30);
                    var gfx = sc.add.graphics().setDepth(20);
                    var alpha = disabled ? 0.35 : 1.0;
                    function draw(hover) {
                        gfx.clear();
                        gfx.fillStyle(bgCol, alpha);
                        gfx.fillRoundedRect(x, y, w, h, 8);
                        gfx.lineStyle(2, hover && !disabled ? 0xffffff : col, alpha);
                        gfx.strokeRoundedRect(x, y, w, h, 8);
                    }
                    draw(false);
                    var lbl = sc.add.text(x + w / 2, y + (sublabel ? h / 2 - 7 : h / 2), label, {
                        fontSize: '13px',
                        fill: disabled ? '#888' : '#fff',
                        fontFamily: 'Arial Black'
                    }).setOrigin(0.5).setDepth(21);
                    var sub = sublabel ? sc.add.text(x + w / 2, y + h / 2 + 8, sublabel, {
                        fontSize: '9px',
                        fill: '#eee',
                        fontFamily: 'Arial'
                    }).setOrigin(0.5).setDepth(21) : null;
                    zone.on('pointerdown', function() { if (sc.myTurn && !sc.busy && !sc.isPaused && !disabled) fn(); });
                    zone.on('pointerover', function() { if (!disabled) { draw(true); lbl.setScale(1.05); } });
                    zone.on('pointerout', function() { draw(false); lbl.setScale(1); });
                    sc.btnGroup.push(zone, gfx, lbl);
                    if (sub) sc.btnGroup.push(sub);
                    return { zone: zone, gfx: gfx, lbl: lbl };
                }

                var hdr = sc.add.text(LP + 8, actY + 6, '', { fontSize: '11px', fill: '#88aacc', fontFamily: 'Arial Black' }).setDepth(25);
                sc.btnGroup.push(hdr);

                var BH = 52, PAD = 6, SX = LP + 6, SY = actY + 22;
                function rowButtons(items, defaultW) {
                    var avail = sc.W - LP - 12;
                    var count = items.length;
                    var bw = defaultW || Math.max(68, Math.floor((avail - PAD * (count - 1)) / count));
                    var total = count * bw + (count - 1) * PAD;
                    var startX = SX + Math.max(0, Math.floor((avail - total) / 2));
                    items.forEach(function(b, i) {
                        mkBtn(b.label, b.sub || '', startX + i * (bw + PAD), SY, bw, BH, b.col, b.bg, b.fn, !!b.dis);
                    });
                }

                if (st === 'MN') {
                    hdr.setText('COMMANDS — Choose an action');
                    var wilLow = (g.wil || 100) < 20;
                    var restrained = !!(sc.pState && (sc.pState.grabbed || sc.pState.downed));
                    var restrLbl = sc.pState && sc.pState.downed ? 'KNOCKED DOWN' : (sc.pState && sc.pState.grabbed ? 'GRABBED' : '');
                    var mainButtons = [
                        { label: '⚔ ATTACK', sub: restrained ? restrLbl : 'Strike enemy', fn: function() { sc._buildActionMenu('ATK'); }, dis: restrained, col: 0xe84560, bg: 0x4d0b1b },
                        { label: '🛡 ENDURE', sub: 'Recover / endure', fn: function() { sc._buildActionMenu('END'); }, dis: false, col: 0x66c3ff, bg: 0x123044 },
                        { label: '✨ LEWD', sub: restrained ? 'Still possible' : ((sc.pCD.lwd.m > 0 && sc.pCD.lwd.c > 0 && sc.pCD.lwd.p > 0 && sc.pCD.lwd.a > 0) ? 'CD' : 'Use desires'), fn: function() { sc._buildActionMenu('LWD'); }, dis: wilLow, col: 0xb94cc6, bg: 0x41074a },
                        { label: '💤 PASS', sub: 'Skip your action', fn: function() { sc._doPass(); }, dis: !sc.myTurn || sc.busy || sc.isPaused, col: 0x9b8cff, bg: 0x23184f },
                        { label: '🏃 FLEE', sub: restrained ? 'Locked' : '-25 STA', fn: function() { sc._doFlee(); }, dis: restrained ? true : (g.sta < 25), col: 0x5fe88d, bg: 0x10301d }
                    ];
                    if (restrained) mainButtons.splice(4, 0, { label: '💢 RESIST', sub: 'Break free', fn: function() { sc._doResist(); }, dis: false, col: 0xffc84f, bg: 0x3d2f09 });
                    rowButtons(mainButtons);
                } else if (st === 'ATK') {
                    hdr.setText('ATTACK — Choose a move');
                    rowButtons([
                        { label: 'STRIKE', sub: 'Dmg: ' + sc._atkDmg(1), fn: function() { sc._doAtk(1, false, 'strike'); }, col: 0xe84560, bg: 0x4d0b1b },
                        { label: 'KICK', sub: sc.pCD.kick > 0 ? 'CD: ' + sc.pCD.kick : 'Dmg: ' + sc._atkDmg(1.4), fn: function() { sc._doAtk(1.4, false, 'kick'); }, dis: sc.pCD.kick > 0, col: 0xdd6622, bg: 0x3d1808 },
                        { label: 'COMBO', sub: sc.pCD.combo > 0 ? 'CD: ' + sc.pCD.combo : 'Dmg: ' + sc._atkDmg(0.7) + '×2', fn: function() { sc._doAtk(0.7, true, 'combo'); }, dis: sc.pCD.combo > 0, col: 0xcc3388, bg: 0x3a0a22 },
                        { label: 'DISARM', sub: sc.pCD.disarm > 0 ? 'CD: ' + sc.pCD.disarm : '-ATK spd', fn: function() { sc._doDisarm(); }, dis: sc.pCD.disarm > 0, col: 0x7755bb, bg: 0x1e1040 },
                        { label: '◀ BACK', sub: '', fn: function() { sc._buildActionMenu('MN'); }, col: 0x555555, bg: 0x1a1a1a }
                    ]);
                } else if (st === 'END') {
                    hdr.setText('ENDURE — Recover or steady');
                    if (sc.endureMenuTurn !== sc.turn) { sc.endureMenuTurn = sc.turn; sc.endureActionsLeft = 2; }
                    rowButtons([
                        { label: 'HP+', fn: function() { sc._doRecover('hp'); }, dis: sc.pCD.endRecover.hp > 0, col: 0x5fe88d, bg: 0x10301d },
                        { label: 'STA+', fn: function() { sc._doRecover('sta'); }, dis: sc.pCD.endRecover.sta > 0, col: 0x66c3ff, bg: 0x123044 },
                        { label: 'WIL+', fn: function() { sc._doRecover('wil'); }, dis: sc.pCD.endRecover.wil > 0, col: 0xffc84f, bg: 0x3d2f09 },
                        { label: 'MEN-', fn: function() { sc._doEndure('m'); }, dis: (sc.pCD.endDes.m || 0) > 0, col: 0x8cd9ff, bg: 0x123044 },
                        { label: 'CAN-', fn: function() { sc._doEndure('c'); }, dis: (sc.pCD.endDes.c || 0) > 0, col: 0xff79c6, bg: 0x4b1030 },
                        { label: 'PHY-', fn: function() { sc._doEndure('p'); }, dis: (sc.pCD.endDes.p || 0) > 0, col: 0x8d7dff, bg: 0x21144d },
                        { label: 'ABS-', fn: function() { sc._doEndure('a'); }, dis: (sc.pCD.endDes.a || 0) > 0, col: 0xffa856, bg: 0x3d2208 },
                        { label: 'REST', fn: function() { sc._doRest(); }, dis: !((g.hp || 0) <= 0 || (g.wil || 0) <= 0 || (g.sta || 0) <= 0), col: 0xb4b4b4, bg: 0x232323 },
                        { label: 'BACK', fn: function() { sc._buildActionMenu('MN'); }, col: 0x555555, bg: 0x1a1a1a }
                    ]);
                } else if (st === 'LWD') {
                    hdr.setText('LEWD — Exploit a desire');
                    var lewdCfg = { m: { scene: 'cp-m', lbl: 'MESMERIZE', sub: 'Mental lure', col: 0x8cd9ff, bg: 0x123044 }, c: { scene: 'tease-b', lbl: 'SEDUCE', sub: 'Carnal tease', col: 0xff79c6, bg: 0x4b1030 }, p: { scene: 'tease-p', lbl: 'ENTICE', sub: 'Physical show', col: 0x8d7dff, bg: 0x21144d }, a: { scene: 'tease-ac', lbl: 'DOMINATE', sub: 'Total display', col: 0xffc84f, bg: 0x3d2f09 } };
                    var items = DATA.desires.map(function(ds) {
                        var cfg = lewdCfg[ds.key];
                        var corr = (g.corruption && g.corruption[ds.key]) || 0;
                        var cd = (sc.pCD.lwd && sc.pCD.lwd[ds.key]) || 0;
                        return { label: cfg.lbl, sub: (cd > 0 ? 'CD: ' + cd + '  ' : '') + cfg.sub + ' ♦' + corr, fn: function(key, sceneName) { return function() { sc._doLust(key, sceneName); }; }(ds.key, cfg.scene), dis: cd > 0 || (g.wil || 100) < 20, col: cfg.col, bg: cfg.bg };
                    });
                    items.push({ label: '◀ BACK', sub: '', fn: function() { sc._buildActionMenu('MN'); }, col: 0x555555, bg: 0x1a1a1a });
                    rowButtons(items);
                }
            },

            _atkDmg: function(mult) {
                return Math.round(15 * (mult || 1) + (this.gs.lvl * 2));
            },

            _setGrabbed: function(sourceName, grip) {
                this.pState = this.pState || { grabbed: false, downed: false, grip: 0, down: 0, grabName: '' };
                this.pState.grabbed = true;
                this.pState.downed = false;
                this.pState.grip = Math.max(this.pState.grip || 0, grip || 1);
                this.pState.grabName = sourceName || this.pState.grabName || '';
                this._logMsg('=== Sylphiette is grabbed! ===');
                this._popupMsg(this.P_X, this.P_Y - 110, 0xff77aa, 'GRABBED!');
                if (this.stanceText) this.stanceText.setText('GRABBED').setColor('#ff77aa');
                if (this._doStateRefresh) this._doStateRefresh();
            },

            _setDowned: function(sourceName, severity) {
                this.pState = this.pState || { grabbed: false, downed: false, grip: 0, down: 0, grabName: '' };
                this.pState.downed = true;
                this.pState.grabbed = false;
                this.pState.down = Math.max(this.pState.down || 0, severity || 1);
                this.pState.grabName = sourceName || this.pState.grabName || '';
                this._logMsg('=== Sylphiette is knocked down! ===');
                this._popupMsg(this.P_X, this.P_Y - 110, 0xffaa44, 'DOWN!');
                if (this.stanceText) this.stanceText.setText('KNOCKED DOWN').setColor('#ffaa44');
                if (this._doStateRefresh) this._doStateRefresh();
            },

            _clearBattleHold: function() {
                this.pState = this.pState || { grabbed: false, downed: false, grip: 0, down: 0, grabName: '' };
                this.pState.grabbed = false;
                this.pState.downed = false;
                this.pState.grip = 0;
                this.pState.down = 0;
                this.pState.grabName = '';
            },

            _doResist: function() {
                this.busy = true;
                this.passStacks = 0;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                var state = this.pState || {};
                var base = (g.wil || 0) + (g.sta || 0) * 0.5 + (g.lvl || 1) * 4;
                var diff = 55 + (state.grip || 0) * 10 + (state.down || 0) * 12;
                var roll = Phaser.Math.Between(1, 100) + Math.floor(base / 8);
                var success = roll >= diff;
                g.sta = Math.max(0, (g.sta || 0) - (success ? 6 : 10));

                if (success) {
                    this._clearBattleHold();
                    this._logMsg('Sylphiette breaks free!');
                    this._popupMsg(this.P_X, this.P_Y - 90, 0x88ccff, 'FREE!');
                    playBattleVoiceCue(this, { kind: 'training', gs: g }, 0);
                } else {
                    if (state.grabbed) state.grip = Math.min(5, (state.grip || 0) + 1);
                    if (state.downed) state.down = Math.min(5, (state.down || 0) + 1);
                    this._logMsg('Sylphiette struggles but stays trapped.');
                    this._popupMsg(this.P_X, this.P_Y - 90, 0xff66aa, 'STUCK!');
                }

                this._doStateRefresh();
                this.time.delayedCall(450, function() {
                    sc._shiftT();
                });
            },

            _doStruggle: function() {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                var state = this.pState || {};
                var vibOn = !!(g.vibrator && g.vibrator.on);
                var activeHold = !!(state.grabbed || state.downed || vibOn);
                if (!activeHold) {
                    this.busy = false;
                    return;
                }

                var hpCost = 8 + (state.downed ? 4 : 0) + (vibOn ? Math.max(0, Number(g.vibrator.stage || this.vibeStage || 1)) * 2 : 0);
                var staCost = 14 + (state.grabbed ? 4 : 0) + (state.downed ? 4 : 0);
                g.hp = Math.max(0, (g.hp || 0) - hpCost);
                g.sta = Math.max(0, (g.sta || 0) - staCost);

                this._clearBattleHold();
                this.vibeStage = 0;
                if (!g.vibrator) g.vibrator = { on: false, stage: 0 };
                g.vibrator.on = false;
                g.vibrator.stage = 0;

                var totalDmg = Math.max(3, Math.floor((hpCost + staCost) / 6));
                this.eList.forEach(function(enemy, idx) {
                    if (!enemy) return;
                    enemy.hp = Math.max(0, (enemy.hp || 0) - totalDmg);
                    if (idx === 0) sc._popupMsg(sc.E_X, sc.E_Y - 70, 0xff9966, '-' + totalDmg + ' ALL');
                });
                this._logMsg('Sylphiette struggles free and blasts the enemy line!');
                this._popupMsg(this.P_X, this.P_Y - 90, 0xff9966, 'BREAK!');
                this.cameras.main.shake(120, 0.008);

                this.time.delayedCall(500, function() {
                    sc._doStateRefresh();
                    if (sc.eList.length > 0 && sc.eList[0].hp <= 0) {
                        sc._resolveEnemyKO(false);
                        return;
                    }
                    sc._consumeEndureAction();
                });
            },

            _endureActionFinished: function(keepOpen) {
                if (keepOpen && this.endureActionsLeft > 0) {
                    this.busy = false;
                    this._buildActionMenu('END');
                    this._doStateRefresh();
                    return;
                }
                this._shiftT();
            },

            _consumeEndureAction: function() {
                this.endureActionsLeft = Math.max(0, (this.endureActionsLeft || 0) - 1);
                if (this.endureActionsLeft > 0) {
                    this._endureActionFinished(true);
                } else {
                    this._endureActionFinished(false);
                }
            },

            _applyEnemyArousalGain: function(enemy, key, amount) {
                if (!enemy || !key) return;
                enemy[key] = Math.min(100, (enemy[key] || 0) + (amount || 0));
            },

            _applySelfLewdPenalty: function(extra) {
                var g = this.gs;
                var dmg = Math.max(0, extra || 0);
                g.wil = Math.max(0, (g.wil || 0) - dmg);
                g.hp = Math.max(0, (g.hp || 0) - Math.max(1, Math.floor(dmg * 0.4)));
            },

            _shouldBattleLose: function() {
                var g = this.gs || {};
                return (Number(g.hp || 0) <= 0 && Number(g.sta || 0) <= 0 && Number(g.wil || 0) <= 0);
            },

            _doRest: function() {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                var beforeOutfit = outfitRank(g);
                g.hp = g.maxHp || 100;
                g.sta = g.maxSta || 100;
                g.wil = g.maxWil || 100;
                g.fatigue = Math.max(0, (g.fatigue || 0) - 12);
                g.battleHeat = Math.min(100, (g.battleHeat || 0) + 8);
                this.restMode = true;
                this._logMsg('Sylphiette takes a full rest to recover.');
                this._popupMsg(this.P_X, this.P_Y - 70, 0x66ccff, 'REST!');
                this.cameras.main.flash(180, 120, 180, 255, false);

                if (beforeOutfit < 4) {
                    advanceOutfit(g, 999);
                    this._logMsg('The enemy tears away every remaining layer while she rests!');
                    this._popupMsg(this.E_X, this.E_Y - 70, 0xff77aa, 'STRIPPED!');
                } else {
                    this._showBubble(this.eList.length > 1 ? 'DEFEAT_DPM' : 'DEFEAT_CP2');
                }

                this.time.delayedCall(420, function() {
                    sc._doStateRefresh();
                    sc._consumeEndureAction();
                });
            },

            _resolveEnemyKO: function(byLust) {
                var sc = this;
                this._doStateRefresh();
                this.time.delayedCall(350, function() {
                    sc._killFrontEnemy(byLust);
                });
            },

            _doAtk: function(mult, combo, type) {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                mult = mult || 1;
                var dmg = this._atkDmg(mult);
                var moveLabel = type === 'kick' ? 'KICK!' : (combo ? 'COMBO!' : 'STRIKE!');
                this._logMsg('Sylphiette uses ' + moveLabel);

                var staCost = combo ? 8 : (type === 'kick' ? 7 : 6);
                g.sta = Math.max(0, (g.sta || g.maxSta || 0) - staCost);
                g.battleHeat = Math.min(100, (g.battleHeat || 0) + (combo ? 4 : 3));
                g.fatigue = Math.min(100, (g.fatigue || 0) + 1);

                playBattleVoiceCue(this, {
                    kind: 'player_attack',
                    gs: this.gs,
                    finisher: !!combo || (this.eList[0] && this.eList[0].hp <= dmg)
                }, 600);

                if (type === 'kick') this.pCD.kick = 2;
                else if (type === 'combo') this.pCD.combo = 3;

                var tex = combo ? 'syl-kick' : (this.anims.exists('syl-kick') ? 'syl-kick' : null);
                if (tex && this.anims.exists(tex)) this.pSpr.play(tex, true);
                else if (this.anims.exists('p-walk-right')) this.pSpr.play('p-walk-right', true);

                var originalX = this.P_X;
                var doHit = function(d) {
                    sc.eList[0].hp = Math.max(0, sc.eList[0].hp - d);
                    sc._popupMsg(sc.E_X, sc.E_Y - 40, 0xff2222, '-' + d);
                    sc.cameras.main.shake(80, 0.005);
                    sc._doStateRefresh();
                };

                var returnToIdle = function() {
                    if (sc.anims.exists('syl-idle')) sc.pSpr.play('syl-idle', true);
                    else if (sc.anims.exists('p-idle-right')) sc.pSpr.play('p-idle-right', true);

                    if (sc.eList[0].hp <= 0) {
                        sc._resolveEnemyKO(false);
                    } else {
                        sc.time.delayedCall(350, function() {
                            sc._doStateRefresh();
                            sc._shiftT();
                        });
                    }
                };

                this.tweens.add({
                    targets: this.pSpr,
                    x: this.E_X - 90,
                    duration: 120,
                    ease: 'Cubic.In',
                    onComplete: function() {
                        doHit(dmg);
                        if (combo) {
                            sc.time.delayedCall(200, function() {
                                sc.tweens.add({
                                    targets: sc.pSpr,
                                    x: sc.E_X - 120,
                                    duration: 60,
                                    yoyo: true,
                                    ease: 'Cubic.Out',
                                    onComplete: function() {
                                        doHit(dmg);
                                        sc.tweens.add({
                                            targets: sc.pSpr,
                                            x: originalX,
                                            duration: 120,
                                            ease: 'Cubic.Out',
                                            onComplete: returnToIdle
                                        });
                                    }
                                });
                            });
                        } else {
                            sc.tweens.add({
                                targets: sc.pSpr,
                                x: originalX,
                                duration: 120,
                                ease: 'Cubic.Out',
                                onComplete: returnToIdle
                            });
                        }
                    }
                });
            },

            _doDisarm: function() {
                this.busy = true;
                this.passStacks = 0;
                this.passStacks = 0;
                var sc = this;
                this.pCD.disarm = 4;
                this.gs.battleHeat = Math.max(0, (this.gs.battleHeat || 0) - 3);
                this._logMsg('Sylphiette disarms! Enemy speed reduced.');
                this._popupMsg(this.E_X, this.E_Y - 60, 0xaaaaff, 'DISARMED!');
                this.eList[0].dmg = Math.max(1, this.eList[0].dmg - 6);
                this.time.delayedCall(500, function() {
                    sc._doStateRefresh();
                    sc._shiftT();
                });
            },

            _doEndure: function(desKey) {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                var corr = (g.corruption && g.corruption[desKey]) || 0;
                var reduce = Math.max(8, 30 - corr * 4);
                var before = g.desires[desKey] || 0;
                g.desires[desKey] = Math.max(0, before - reduce);
                g.sta = Math.max(0, (g.sta || g.maxSta) - 10);

                var dName = (DATA.desires.find(function(d) {
                    return d.key === desKey;
                }) || {}).n || desKey;
                this._logMsg('Sylphiette steadies herself (' + dName + ' -' + reduce + ')');
                this._popupMsg(this.P_X, this.P_Y - 70, 0x44ccff, dName + ' -' + reduce);
                this.cameras.main.flash(250, 100, 180, 255, false);

                this.time.delayedCall(400, function() {
                    sc._doStateRefresh();
                    sc._consumeEndureAction();
                });
            },

            _doRecover: function(kind) {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                kind = String(kind || '').toLowerCase();
                this.pCD.endRecover[kind] = 4;

                var hpGain = 0, staGain = 0, wilGain = 0, label = '';
                if (kind === 'hp') {
                    hpGain = 14;
                    label = 'HP';
                    g.hp = Math.min(g.maxHp || 100, (g.hp || 0) + hpGain);
                } else if (kind === 'sta') {
                    staGain = 16;
                    label = 'STA';
                    g.sta = Math.min(g.maxSta || 100, (g.sta || 0) + staGain);
                } else if (kind === 'wil') {
                    wilGain = 12;
                    label = 'WIL';
                    g.wil = Math.min(g.maxWil || 100, (g.wil || 0) + wilGain);
                } else {
                    this.busy = false;
                    return;
                }

                this._logMsg('Sylphiette recovers ' + label + '.');
                this._popupMsg(this.P_X, this.P_Y - 70, 0x66ccff, '+' + label);
                this.cameras.main.flash(180, 120, 180, 255, false);

                this.time.delayedCall(360, function() {
                    sc._doStateRefresh();
                    sc._consumeEndureAction();
                });
            },

            _removeVibrator: function() {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                this.vibeStage = 0;
                g.vibrator = { on: false, stage: 0 };
                this._logMsg('Sylphiette removes the vibrator.');
                this._popupMsg(this.P_X, this.P_Y - 80, 0xff99cc, 'VIB OFF');
                if (this.vibeText) this.vibeText.setText('').setColor('#ff9ad5');
                this.time.delayedCall(260, function() {
                    sc._doStateRefresh();
                    sc._consumeEndureAction();
                });
            },

            _doLust: function(desKey, sceneName) {
                this.busy = true;
                this.passStacks = 0;
                var sc = this;
                var g = this.gs;
                desKey = desKey || this.ecfg.des;
                sceneName = sceneName || 'tease-bp';
                this.pCD.lwd[desKey] = 2;

                var corr = (g.corruption && g.corruption[desKey]) || 0;
                var desInc = Phaser.Math.Between(25, 40) + corr * 5;
                var wilCost = 5 + corr * 2;

                var restrained = !!(this.pState && (this.pState.grabbed || this.pState.downed));
                var restMode = !!this.restMode;
                var extraSelf = restrained ? ((this.pState.downed ? 14 : 8) + corr * 3) : 0;
                var isNudeNow = (getPortraitState(g).indexOf('nude2') >= 0);
                var onFloorNow = restrained || (g.hp || g.maxHp || 0) <= Math.max(20, Math.floor((g.maxHp || 100) * 0.3));
                this.vibeStage = restrained || onFloorNow ? Math.min(3, (this.vibeStage || 0) + 1) : Math.max(0, (this.vibeStage || 0) - 1);
                var vibeScene = pickVibeSceneKey({
                    desKey: desKey,
                    vibeStage: this.vibeStage,
                    restrained: restrained,
                    onFloor: onFloorNow,
                    aggr: (this.eList[0] && this.eList[0].aggr) || '',
                    hasVibrator: !!(g.vibrator && g.vibrator.on),
                    outfit: getPortraitState(g),
                    multiEnemy: this.eList.length > 1
                });
                if (vibeScene) sceneName = vibeScene;
                this._showBubble(sceneName);
                this._logMsg('Sylphiette exploits ' + desKey.toUpperCase() + ' desire! (+' + desInc + ')');

                this.eList[0][desKey] = Math.min(100, (this.eList[0][desKey] || 0) + desInc);
                this._applyEnemyArousalGain(this.eList[0], desKey, Phaser.Math.Between(4, 9));
                ['m', 'c', 'p', 'a'].forEach(function(k) {
                    if (k !== desKey) sc.eList[0][k] = Math.min(100, (sc.eList[0][k] || 0) + Phaser.Math.Between(3, 10));
                });
                g.wil = Math.max(0, (g.wil || g.maxWil) - wilCost - extraSelf);
                if (desKey === 'a') {
                    advanceOutfit(g, 1);
                    g.wil = Math.max(0, (g.wil || g.maxWil) - 18);
                    g.hp = Math.max(0, (g.hp || g.maxHp) - 8);
                    if (restrained || onFloorNow) {
                        this.vibeStage = Math.min(3, (this.vibeStage || 0) + (restMode ? 2 : 1));
                    }
                }
                if (extraSelf > 0) {
                    g.hp = Math.max(0, (g.hp || g.maxHp) - Math.max(2, Math.floor(extraSelf * 0.5)));
                }

                playBattleVoiceCue(this, {
                    kind: 'lewd_attack',
                    gs: g,
                    sceneTag: sceneName,
                    enemyArousal: this.eList[0][desKey],
                    isNude: isNudeNow,
                    onFloor: onFloorNow
                }, 650);

                if (sceneName && /scene(?:oral|oral2|group|group2|group2-cp|group3|ride2-2)/i.test(sceneName)) {
                    playBattleVoiceCue(this, {
                        kind: 'scene',
                        gs: g,
                        sceneTag: sceneName
                    }, 800);
                }

                this._popupMsg(this.E_X, this.E_Y - 80, 0xff66cc, 'LUST +' + desInc + (extraSelf > 0 ? '  SELF-' + extraSelf : ''));
                this._doStateRefresh();

                this.time.delayedCall(2200, function() {
                    var ew = false;
                    ['m', 'c', 'p', 'a'].forEach(function(k) {
                        if (sc.eList[0][k] >= 100) ew = true;
                    });
                    if (ew) {
                        sc.eList[0].hp = 0;
                        sc._resolveEnemyKO(true);
                    } else if (sc._shouldBattleLose()) {
                        sc._lossTrig('DEFEAT_CP');
                    } else {
                        sc._shiftT();
                    }
                });
            },

            _doFlee: function() {
                if (this.pState && (this.pState.grabbed || this.pState.downed)) {
                    this._logMsg('Sylphiette cannot flee while restrained!');
                    this._popupMsg(this.P_X, this.P_Y - 50, 0xff8866, 'LOCKED!');
                    return;
                }
                if (this.gs.sta < 25) return;
                this.busy = true;
                this.passStacks = 0;
                applyBattleAftermath(this.gs, { result: 'flee', heat: 6, fatigue: 4, aftershock: 1 });
                this.gs.sta -= 25;
                clearBattleVibratorState(this.gs);
                if (this.sourceEnemyId) {
                    setMapEnemyCooldownUntil(this.gs, this.sourceEnemyId, this.time.now + 3000);
                }
                var _rp = this.returnPos || {};
                var _rs = (_rp && _rp.scene) ? _rp.scene : 'Corridor';
                stampSceneCheckpoint(this.gs, _rs, this.returnPos ? { spawnX: this.returnPos.x, spawnY: this.returnPos.y } : null);
                this._logMsg('Sylphiette retreats from battle!');
                this._popupMsg(this.P_X, this.P_Y - 50, 0x88ccff, 'FLED!');
                playVoiceCue(this, 'battle_flee', 0);
                var rp = this.returnPos || {};
                var returnScene = (rp && rp.scene) ? rp.scene : 'Corridor';
                this.time.delayedCall(1000, function() {
                    this.scene.start(returnScene, {
                        gs: this.gs,
                        spawnX: rp.x,
                        spawnY: rp.y
                    });
                }.bind(this));
            },

            _grantExp: function(amt) {
                this.gs.exp += amt;
                this._logMsg('Gained ' + amt + ' EXP!');
                var needed = this.gs.lvl * 100;
                if (this.gs.exp >= needed) {
                    this.gs.lvl++;
                    this.gs.exp -= needed;
                    this.gs.maxHp += 15;
                    this.gs.maxSta += 10;
                    this.gs.maxWil += 10;
                    this.gs.hp = this.gs.maxHp;
                    this.gs.sta = this.gs.maxSta;
                    this.gs.wil = this.gs.maxWil;
                    grantSkillPoint(this.gs, 1, 'Level up bonus');
                    this._popupMsg(this.P_X, this.P_Y - 120, 0xffff00, 'LEVEL UP!');
                    this._logMsg('Sylphiette reached Level ' + this.gs.lvl + '!');
                }
            },

            _killFrontEnemy: function(byLust) {
                var sc = this;
                var deadSpr = this.eSprites.shift();
                this.eList.shift();
                this._logMsg('Enemy defeated' + (byLust ? ' by lust!' : '!'));

                playBattleVoiceCue(this, {
                    kind: 'defeat',
                    gs: this.gs,
                    byLust: !!byLust
                }, 0);
                this.tweens.add({
                    targets: deadSpr,
                    alpha: 0,
                    y: '+=50',
                    duration: 400,
                    onComplete: function() {
                        deadSpr.destroy();
                    }
                });
                this._grantExp(25 + this.gs.lvl * 5);

                if (this.eList.length === 0) {
                    this.time.delayedCall(800, function() {
                        sc._vicTrigger();
                    });
                } else {
                    this.eSpr = this.eSprites[0];
                    this.eSprites.forEach(function(s, i) {
                        sc.tweens.add({
                            targets: s,
                            x: sc.E_X + i * 60,
                            y: sc.E_Y - i * 15,
                            duration: 300
                        });
                    });
                    this.time.delayedCall(800, function() {
                        sc._doStateRefresh();
                        sc._startPlayerTurn();
                    });
                }
            },

            _doPass: function() {
                this.busy = true;
                this.passStacks = (this.passStacks || 0) + 1;
                this.gs.battleHeat = Math.min(100, (this.gs.battleHeat || 0) + 1);
                this.gs.fatigue = Math.min(100, (this.gs.fatigue || 0) + 1);
                this._logMsg('Sylphiette waits.');
                this._buildActionMenu('MN');
                this.time.delayedCall(300, this._shiftT.bind(this));
            },

            _buildPauseMenu: function(W, H) {
                this.pauseUI = [];
                this.isPaused = false;
                var sc = this;
                this.pauseUI.push(this.add.rectangle(W / 2, H / 2, W, H, 0x000, 0.85).setDepth(9999).setOrigin(0.5).setVisible(false).setInteractive());
                this.pauseUI.push(this.add.rectangle(W / 2, H / 2, 400, 360, 0x150b28).setStrokeStyle(3, 0x8a2be2).setDepth(9999).setVisible(false));
                var pTitle = this.add.text(W / 2, H / 2 - 140, 'PAUSED', {
                    fontSize: '30px',
                    fill: '#8ac4ff',
                    fontFamily: 'Georgia'
                }).setOrigin(0.5).setDepth(9999).setVisible(false);
                this.pauseUI.push(pTitle);

                var cmds = [{
                        t: 'Resume',
                        fn: function() {
                            sc._togglePause();
                        }
                    },
                    {
                        t: 'Save Data',
                        fn: function() {
                            pTitle.setText('SAVING...');
                            var payload = captureSaveData(sc);
                            SV.write(payload, function(sr) {
                                pTitle.setText(sr && sr.ok ? 'SAVED!' : 'SAVED LOCAL');
                                setTimeout(function() {
                                    if (pTitle) pTitle.setText('PAUSED');
                                }, 1200);
                            });
                        }
                    },
                    {
                        t: 'Load Data',
                        fn: function() {
                            pTitle.setText('LOADING...');
                            SV.read(function(res) {
                                var d = normalizeSaveData(res || JSON.parse(localStorage.getItem('ws_local') || 'null'));
                                if (d && d.gs) {
                                    if (d.sceneKey === 'Battle') {
                                        var battleData = d.sceneData || {};
                                        battleData.gs = d.gs;
                                        sc.scene.start('Battle', battleData);
                                        return;
                                    }
                                    sc.gs = initGameState(d.gs);
                                    sc._doStateRefresh();
                                    pTitle.setText('LOADED!');
                                } else {
                                    pTitle.setText('NO DATA!');
                                }
                                setTimeout(function() {
                                    if (pTitle) pTitle.setText('PAUSED');
                                }, 1200);
                            });
                        }
                    },
                    {
                        t: 'Main Menu',
                        fn: function() {
                            var payload = captureSaveData(sc);
                            SV.write(payload, function() {
                                sc._closePerkMenu && sc._closePerkMenu();
                                if (sc.isPaused) sc._togglePause();
                                sc.scene.start('Title');
                            });
                        }
                    }
                ];
                cmds.forEach(function(c, i) {
                    var btn = sc.add.text(W / 2, H / 2 - 40 + (i * 60), c.t, {
                        fontSize: '24px',
                        fill: '#ddd',
                        fontFamily: 'Georgia'
                    }).setOrigin(0.5).setInteractive({
                        useHandCursor: true
                    }).setDepth(9999).setVisible(false);
                    btn.on('pointerdown', c.fn);
                    btn.on('pointerover', function() {
                        btn.setColor('#d4af37');
                    });
                    btn.on('pointerout', function() {
                        btn.setColor('#ddd');
                    });
                    sc.pauseUI.push(btn);
                });
            },

            _togglePause: function() {
                this.isPaused = !this.isPaused;
                syncPauseUIVisibility(this, this.isPaused);
                if (this.isPaused) {
                    this.physics.pause();
                    this.anims.globalTimeScale = 0;
                } else {
                    this.physics.resume();
                    this.anims.globalTimeScale = 1;
                }
            },
            update: function(tm) {
                if (Phaser.Input.Keyboard.JustDown(this.keys.esc)) {
                    this._togglePause();
                }
            },

            _logMsg: function(m) {
                this.outMsg.unshift(m);
                if (this.outMsg.length > 3) this.outMsg.pop();
                for (var i = 0; i < 3; i++) {
                    if (this.outMsg[i] && this.logLines[i]) this.logLines[i].setText("> " + this.outMsg[i]);
                }
            },

            _popupMsg: function(x, y, c, v) {
                var cl = typeof c === 'number' ? '#' + c.toString(16).padStart(6, '0') : c;
                var dT = this.add.text(x, y, v, {
                    fontSize: '26px',
                    fill: cl,
                    fontFamily: 'Arial Black',
                    stroke: '#000',
                    strokeThickness: 4
                }).setOrigin(0.5).setDepth(200);
                this.tweens.add({
                    targets: dT,
                    y: '-=60',
                    alpha: 0,
                    duration: 1400,
                    ease: 'Cubic.Out',
                    onComplete: function() {
                        dT.destroy();
                    }
                });
            },

            _showBubble: function(k) {
                var cfg = DATA.actionScenes[k] || DATA.scenes[k];
                if (!cfg) return;
                var isSml = (cfg.b === 'small');
                var dx = isSml ? this.E_X - 100 : this.scale.width / 2;
                var dy = isSml ? this.E_Y - 140 : this.scale.height / 2 - 60;

                var texKey = DATA.actionScenes[k] ? 'ascene-' + k : 'sc-' + k;
                var hasTex = this.textures.exists(texKey);
                var frameW = 240, frameH = 160;
                if (hasTex) {
                    var fr = this.textures.get(texKey).get(0);
                    if (fr && fr.width > 0 && fr.height > 0) {
                        frameW = fr.width;
                        frameH = fr.height;
                    }
                }

                var maxW = isSml ? 280 : 480;
                var maxH = isSml ? 180 : 300;
                var padX = 18;
                var padY = 18;
                var capH = cfg.caption ? 24 : 0;
                var sca = Math.min((maxW - padX * 2) / frameW, (maxH - padY * 2 - capH) / frameH, 1);
                if (!isFinite(sca) || sca <= 0) sca = 1;
                var imgW = frameW * sca;
                var imgH = frameH * sca;
                var bw = Math.max(120, Math.ceil(imgW + padX * 2));
                var bh = Math.max(100, Math.ceil(imgH + padY * 2 + capH));
                var imgY = -Math.max(0, (capH * 0.5));

                var bCt = this.add.container(dx, dy).setDepth(200).setScale(0);
                var bg = this.add.graphics();
                bg.fillStyle(0x140d1d, 0.82);
                bg.lineStyle(3, 0xf5e7ff, 0.55);
                bg.fillRoundedRect(-bw / 2, -bh / 2, bw, bh, 18);
                bg.strokeRoundedRect(-bw / 2, -bh / 2, bw, bh, 18);
                bCt.add(bg);

                if (hasTex) {
                    var img = this.add.sprite(0, imgY, texKey);
                    img.setScale(sca);
                    if (this.anims.exists(texKey + '-anim')) {
                        img.play(texKey + '-anim', true);
                    }
                    bCt.add(img);
                }
                if (cfg.caption) {
                    bCt.add(this.add.text(0, bh / 2 - 16, cfg.caption, {
                        fontSize: '14px',
                        fill: '#f2ecff',
                        fontFamily: 'Georgia',
                        fontStyle: 'italic',
                        stroke: '#000',
                        strokeThickness: 3
                    }).setOrigin(0.5));
                }

                var sc = this;
                this.tweens.add({
                    targets: bCt,
                    scale: 1,
                    duration: 300,
                    ease: 'Back.easeOut'
                });
                this.time.delayedCall(2200, function() {
                    sc.tweens.add({
                        targets: bCt,
                        scale: 0,
                        duration: 150,
                        onComplete: function() {
                            bCt.destroy();
                        }
                    });
                });
            },

            _doStateRefresh: function() {
                var g = this.gs;
                if (!g.vibrator) g.vibrator = { on: false, stage: 0 };
                var vibOn = !!g.vibrator.on;
                if (!vibOn) {
                    this.vibeStage = 0;
                    g.vibrator.stage = 0;
                } else {
                    this.vibeStage = Math.max(1, Math.min(3, Number(this.vibeStage || g.vibrator.stage || 1)));
                    g.vibrator.stage = this.vibeStage;
                    g.vibrator.on = true;
                }
                this.pBars['hp'].b.clear().fillStyle(0xe94560, 1).fillRect(this.pBars['hp'].x, 10, 200 * (Math.max(0, g.hp) / g.maxHp), 20);
                this.pBars['hp'].t.setText(Math.ceil(g.hp) + '/' + g.maxHp);
                this.pBars['sta'].b.clear().fillStyle(0x44aaff, 1).fillRect(this.pBars['sta'].x, 10, 200 * (Math.max(0, g.sta) / g.maxSta), 20);
                this.pBars['sta'].t.setText(Math.ceil(g.sta) + '/' + g.maxSta);
                this.pBars['wil'].b.clear().fillStyle(0xffaa00, 1).fillRect(this.pBars['wil'].x, 10, 200 * (Math.max(0, g.wil) / g.maxWil), 20);
                this.pBars['wil'].t.setText(Math.ceil(g.wil) + '/' + g.maxWil);
                fitToBox(this, this.port, 'portrait-' + getPortraitState(g), this.Z.LP - 4, 420);

                var td = (g.desires.m || 0) + (g.desires.c || 0) + (g.desires.p || 0) + (g.desires.a || 0);
                var fc = 'neutral';
                if (g.wil <= g.maxWil * 0.15) fc = 'ahegao';
                else if (g.wil <= g.maxWil * 0.3) fc = 'crying';
                else if (g.hp <= g.maxHp * 0.3) fc = 'hurt';
                else if (td > 150) fc = 'aroused';
                else if (td > 70) fc = 'embarrassed';
                fitToBox(this, this.faceImg, 'face-' + fc, this.Z.LP - 4, this.Z.BOT - 4);

                if (this.eList.length > 0) {
                    var actE = this.eList[0];
                    this.eNameTxt.setText(actE.name + ' (' + this.eList.length + ' left)');
                    var ehp = Math.max(0, Number(actE.hp || 0));
                    var emax = Math.max(1, Number(actE.maxHp || 1));
                    this.eBars['hp'].b.clear().fillStyle(0xff2222, 1).fillRect(this.eBars['hp'].x, this.eBars['hp'].y, (this.Z.RP - 40) * Math.max(0, Math.min(1, ehp / emax)), 16);
                    this.eHpTxt.setText(Math.ceil(actE.hp) + '/' + actE.maxHp + ' HP');

                    var sc = this;
                    DATA.desires.forEach(function(ds) {
                        sc.pBars[ds.key].b.clear().fillStyle(0x9b59b6, 1).fillRect(sc.pBars[ds.key].x, sc.pBars[ds.key].y, 140 * Math.min(100, g.desires[ds.key] || 0) / 100, 10);
                        if (sc.eBars[ds.key]) sc.eBars[ds.key].b.clear().fillStyle(0x4a1a6a, 1).fillRect(sc.eBars[ds.key].x, sc.eBars[ds.key].y, (sc.Z.RP - 60) * Math.min(100, actE[ds.key] || 0) / 100, 10);
                        if (sc.corrDots && sc.corrDots[ds.key]) {
                            var corrLevel = g.desires ? g.desires[ds.key] || 0 : 0;
                            drawCorrDots(sc.corrDots[ds.key], sc.pBars[ds.key].x, sc.pBars[ds.key].y, 140, corrLevel);
                            syncDesireReadout(sc, ds.key, corrLevel, sc.pBars[ds.key].x, sc.pBars[ds.key].y, 140);
                        }
                    });
                }

                this.uiTurnStr.setText('Turn ' + this.turn);
                if (this.flowTxt) {
                    var threat = Math.round(Math.min(100, (Number(g.battleHeat || 0) * 0.6) + (corruptionAverage(g) * 0.35) + (Number(g.fatigue || 0) * 0.25)));
                    this.flowTxt.setText('Threat ' + threat + '%');
                    this.flowTxt.setColor(threat >= 70 ? '#ff6666' : (threat >= 40 ? '#ffbb55' : '#ff88cc'));
                }
                if (this.stanceText) {
                    var st = getStanceLabel(g, this.pState);
                    this.stanceText.setText(st.lbl).setColor(st.color);
                }
            },

            _checkDesireOverflow: function(cb) {
                var sc = this,
                    g = this.gs,
                    overflowed = false;
                var desKeys = ['m', 'c', 'p', 'a'];
                var sceneMap = {
                    m: 'cp-m',
                    c: 'oral',
                    p: 'tease-p',
                    a: 'strip'
                };
                var msgMap = {
                    m: 'Mental Break!',
                    c: 'Carnal Submit!',
                    p: 'Physical Yield!',
                    a: 'Absolute Surrender!'
                };

                desKeys.forEach(function(k) {
                    if ((g.desires[k] || 0) >= 100) {
                        overflowed = true;
                        g.corruption[k] = Math.min(70, (g.corruption[k] || 0) + 1);
                        var wilDmg = 5 + Math.floor(g.corruption[k] * 0.8);
                        g.wil = Math.max(0, g.wil - wilDmg);
                        g.desires[k] = 0;

                        sc._showBubble(sceneMap[k] || 'strip');
                        sc._logMsg('⚠ ' + msgMap[k] + ' Corruption +1 (' + k.toUpperCase() + ':' + g.corruption[k] + ') WIL -' + wilDmg);
                        sc._popupMsg(sc.P_X, sc.P_Y - 100, 0xff0066, '💀 OVERFLOW!');
                        sc.cameras.main.flash(400, 255, 0, 100);
                    }
                });

                if (overflowed) {
                    sc.time.delayedCall(2400, function() {
                        sc._doStateRefresh();
                        if (sc._shouldBattleLose()) {
                            sc._lossTrig('DEFEAT_CP');
                            return;
                        }
                        if (cb) cb();
                    });
                } else {
                    if (cb) cb();
                }
                return overflowed;
            },

            _shiftT: function() {
                this.myTurn = false;
                this.pTurnTxt.setAlpha(0.3);
                this.eTurnTxt.setAlpha(1);
                this.eTurnTxt.setText('▶ ENEMY');
                this.time.delayedCall(800, this._enemyAi.bind(this));
            },

            _startPlayerTurn: function() {
                this.turn++;
                this.myTurn = true;
                this.busy = false;
                this.endureActionsLeft = 2;
                this.endureMenuTurn = this.turn;
                this.pTurnTxt.setAlpha(1);
                this.eTurnTxt.setAlpha(0.3);
                this.eTurnTxt.setText('▶ ENEMY');
                var g = this.gs;
                if ((g.hp || 0) <= 0 && (g.wil || 0) <= 0) {
                    var staDrain = 8 + (this.eList.length > 0 ? Math.floor((this.eList[0].dmg || 10) * 0.4) : 5);
                    g.sta = Math.max(0, (g.sta || 0) - staDrain);
                    this._logMsg('Defenseless! STA draining: -' + staDrain);
                    this._popupMsg(this.P_X, this.P_Y - 60, 0xff4422, 'STA -' + staDrain);
                    if (g.sta <= 0) {
                        this.time.delayedCall(600, function() { this._lossTrig('DEFEAT_CP2'); }.bind(this));
                        return;
                    }
                }
                if (this.gs && this.gs.vibrator && this.gs.vibrator.on) {
                    var vibStage = Math.max(1, Number(this.gs.vibrator.stage || this.vibeStage || 1));
                    this.gs.desires.a = Math.min(100, (this.gs.desires.a || 0) + vibStage * 3);
                    this.gs.wil = Math.max(0, (this.gs.wil || 0) - vibStage * 2);
                    this.gs.hp = Math.max(0, (this.gs.hp || 0) - Math.max(1, Math.floor(vibStage / 2)));
                    this._logMsg('The vibrator keeps working...');
                    this._popupMsg(this.P_X, this.P_Y - 70, 0xff66cc, 'VIB!');
                }
                for (var k in this.pCD) {
                    if (!this.pCD.hasOwnProperty(k)) continue;
                    if (typeof this.pCD[k] === 'object' && this.pCD[k]) {
                        for (var lk in this.pCD[k]) {
                            if (!this.pCD[k].hasOwnProperty(lk)) continue;
                            if (this.pCD[k][lk] > 0) this.pCD[k][lk]--;
                        }
                    } else if (this.pCD[k] > 0) {
                        this.pCD[k]--;
                    }
                }
                this._buildActionMenu('MN');
                this._doStateRefresh();
            },

            _enemyAi: function() {
                if (this.eList.length === 0) return;
                var sc = this,
                    eObj = this.eList[0],
                    eSpr = this.eSprites[0],
                    g = this.gs;

                var keys = ['m', 'c', 'p', 'a'];
                var passPressure = Math.min(4, this.passStacks || 0);
                var enemyHorny = isEnemyHorny(eObj);
                var multiEnemy = this.eList.length > 1;
                var battleScale = battlePressureScale(g);
                var role = String(eObj.role || (eObj.ecfg && eObj.ecfg.role) || '').toLowerCase();
                var playerDemand = {
                    m: Math.max(0, 100 - (g.desires && g.desires.m || 0)),
                    c: Math.max(0, 100 - (g.desires && g.desires.c || 0)),
                    p: Math.max(0, 100 - (g.desires && g.desires.p || 0)),
                    a: Math.max(0, 100 - (g.desires && g.desires.a || 0))
                };
                var weights = {
                    m: 1.35 + playerDemand.m * 0.02,
                    c: 1.30 + playerDemand.c * 0.02,
                    p: 0.95 + playerDemand.p * 0.012,
                    a: multiEnemy ? 0.45 : 0.14,
                    vibe: multiEnemy ? 0.15 : 0
                };
                if (role === 'sentinel') {
                    weights.p += 0.35;
                    weights.m += 0.45;
                    weights.c += 0.35;
                    weights.a += 0.15;
                } else if (role === 'skirmisher') {
                    weights.m += 0.8;
                    weights.c += 0.45;
                    weights.a -= 0.10;
                } else if (role === 'dominator') {
                    weights.c += 0.95;
                    weights.vibe += 0.4;
                    weights.a += 0.25;
                    weights.m += 0.2;
                } else if (role === 'captain') {
                    weights.a += 0.35;
                    weights.c += 0.65;
                    weights.p += 0.25;
                    weights.m += 0.35;
                    weights.vibe += 0.2;
                }
                keys.forEach(function(k) {
                    weights[k] += (g.corruption[k] || 0) * 1.25 * battleScale;
                    weights[k] += playerDemand[k] * 0.01 * battleScale;
                });
                if (eObj.des && weights[eObj.des] != null) {
                    weights[eObj.des] += 0.75;
                }
                if (eObj.lastDesire && weights[eObj.lastDesire] != null) {
                    weights[eObj.lastDesire] *= 0.6;
                }
                if (passPressure > 0) {
                    weights.c += passPressure * 0.25;
                    weights.p += passPressure * 0.15;
                    weights.m += passPressure * 0.1;
                    weights.a += passPressure * 0.1;
                    weights.vibe += passPressure * 0.18;
                }
                if (multiEnemy) {
                    weights.a += enemyHorny ? 1.5 : 0.55;
                    weights.c += enemyHorny ? 1.35 : 0.65;
                    weights.m += enemyHorny ? 0.55 : 0.75;
                    weights.p += enemyHorny ? 0.55 : 0.35;
                    weights.vibe += enemyHorny ? 2.2 : 0.6;
                    weights.a *= enemyHorny ? 1.05 : 0.9;
                }
                if (enemyHorny) {
                    weights.vibe += 1.5 * battleScale;
                    weights.a += 0.7 * battleScale;
                    weights.c += 0.5 * battleScale;
                }
                var totalW = keys.reduce(function(s, k) {
                    return s + Math.max(0.05, weights[k] || 0);
                }, 0);
                var rand = Math.random() * totalW,
                    cum = 0,
                    targetDes = 'm';
                keys.forEach(function(k) {
                    cum += Math.max(0.05, weights[k] || 0);
                    if (!targetDes || rand <= cum) targetDes = k;
                });
                eObj.lastDesire = targetDes;

                var beforeOutfitRank = outfitRank(g);
                var roll = Math.random();
                var type;
                if (multiEnemy && enemyHorny && roll < 0.38) type = 'vibe';
                else if (passPressure > 0 && roll < (0.22 + passPressure * 0.14)) type = 'grapple';
                else if (multiEnemy && roll < (enemyHorny ? 0.72 : 0.64)) type = (enemyHorny && roll < 0.42) ? 'vibe' : 'desire';
                else if (roll < 0.58) type = 'desire';
                else type = 'attack';

                // Cooldown prevention for exact action repeats
                if (eObj.lastAct === type) type = (type === 'attack') ? 'desire' : 'attack';
                eObj.lastAct = type;

                // Grapple Override logic when clothing is fully destroyed
                var isFullyNude = (getPortraitState(g).includes('nude2'));
                var restMode = !!this.restMode;
                var restDesireMult = restMode ? 2 : 1;
                if (restMode && !isFullyNude) {
                    advanceOutfit(g, 999);
                    isFullyNude = true;
                    this._logMsg('=== Enemy rips away every remaining layer! ===');
                    this._popupMsg(this.P_X, this.P_Y - 95, 0xff77aa, 'NUDITY!');
                }
                if (type === 'desire' && isFullyNude && Math.random() < 0.6) {
                    type = 'grapple';
                }
                var mm = {
                    'm': 'cp-m',
                    'c': 'grope-b',
                    'p': 'tease-p',
                    'a': 'strip'
                };

                var finishEnemyTurn = function() {
                    if (sc.restMode) sc.restMode = false;
                    if (sc._shouldBattleLose()) {
                        sc._lossTrig('DEFEAT_CP2');
                        return;
                    }
                    sc._startPlayerTurn();
                };

                if (type === 'vibe') {
                    this._logMsg('=== ' + eObj.name + ' rigs the vibrator in place! ===');
                    var vibStage = Math.max(1, Math.min(3, Number((g.vibrator && g.vibrator.stage) || this.vibeStage || 0) + 1));
                    g.vibrator = { on: true, stage: vibStage };
                    this.vibeStage = vibStage;
                    g.wil = Math.max(0, g.wil - (8 + vibStage * 2));
                    g.desires.a = Math.min(100, (g.desires.a || 0) + (10 + vibStage * 4) * restDesireMult);
                    ['m', 'c', 'p'].forEach(function(k) {
                        g.desires[k] = Math.min(100, (g.desires[k] || 0) + Phaser.Math.Between(4, 10) * restDesireMult);
                    });
                    if (!this.pState || (!this.pState.grabbed && !this.pState.downed)) {
                        this._setGrabbed(eObj.name, 1);
                    }
                    this._popupMsg(this.P_X, this.P_Y - 80, 0xff66cc, 'VIB+' + vibStage);
                    this.time.delayedCall(1800, function() {
                        sc._doStateRefresh();
                        sc._checkDesireOverflow(finishEnemyTurn);
                    });
                } else if (type === 'grapple') {
                    this._logMsg('=== ' + eObj.name + ' attempts a brutal grapple! ===');
                    var scenePool = ['GUARD_WIN', 'ROGUE_WIN', 'DEFEAT_CP', 'DEFEAT_CP2'];
                    if (multiEnemy) scenePool.push('DEFEAT_APM', 'DEFEAT_DPM', 'DEFEAT_DPM2');
                    if (isFullyNude && multiEnemy) scenePool.push('DEFEAT_CPB', 'DEFEAT_DPM2');
                    var sName = scenePool[Phaser.Math.Between(0, scenePool.length - 1)];
                    this._showBubble(sName);

                    var dmg = 25 + (g.corruption.p || 0) * 5;
                    ['m', 'c', 'p', 'a'].forEach(function(k) {
                        g.desires[k] = Math.min(100, (g.desires[k] || 0) + dmg * restDesireMult);
                    });
                    eObj[targetDes] = Math.min(100, (eObj[targetDes] || 0) + Phaser.Math.Between(8, 14));
                    if (targetDes === 'a') {
                        advanceOutfit(g, 1);
                        g.wil = Math.max(0, g.wil - 18);
                        g.hp = Math.max(0, g.hp - 8);
                    }
                    if ((g.hp || 0) <= 0 && (g.wil || 0) <= 0) {
                        g.sta = Math.max(0, (g.sta || 0) - 15);
                    } else {
                        g.wil = Math.max(0, g.wil - 15);
                    }
                    this.vibeStage = Math.min(3, (this.vibeStage || 0) + (restMode ? 2 : 1));
                    this._setGrabbed(eObj.name, 1 + Math.floor((g.corruption.m || 0) / 4));
                    if (restMode && isFullyNude) this._showBubble('DEFEAT_CP2');
                    this._popupMsg(this.P_X, this.P_Y - 80, 0xff0066, 'GRAPPLED!');

                    this.time.delayedCall(2300, function() {
                        sc._doStateRefresh();
                        var mm = {
                            'm': 'cp-m',
                            'c': 'grope-b',
                            'p': 'tease-p',
                            'a': 'strip'
                        };
                        var bubbleKey = pickVibeSceneKey({
                            desKey: targetDes,
                            vibeStage: sc.vibeStage,
                            restrained: true,
                            onFloor: true,
                            aggr: eObj.aggr || '',
                            allowTeaseVibe: false,
                            hasVibrator: !!(g.vibrator && g.vibrator.on),
                            outfit: getPortraitState(g),
                            multiEnemy: sc.eList.length > 1
                        }) || mm[targetDes] || 'strip';
                        playBattleVoiceCue(sc, {
                            kind: 'lewd_attack',
                            gs: g,
                            sceneTag: bubbleKey,
                            enemyArousal: g.desires[targetDes] || 0,
                            isNude: getPortraitState(g).indexOf('nude2') >= 0,
                            onFloor: (g.hp || g.maxHp || 0) <= Math.max(20, Math.floor((g.maxHp || 100) * 0.3))
                        }, 850);
                        if (outfitRank(g) > beforeOutfitRank) {
                            playBattleVoiceCue(sc, { kind: 'torn', gs: g }, 700);
                        }
                        if (sc._shouldBattleLose()) {
                            sc._lossTrig('DEFEAT_CP');
                            return;
                        }
                        sc._checkDesireOverflow(finishEnemyTurn);
                    });
                } else if (type === 'desire') {
                    var corrBonus = (g.corruption[targetDes] || 0) * 4;
                    var inc = Phaser.Math.Between(20, 30) + corrBonus;
                    g.desires[targetDes] = Math.min(100, (g.desires[targetDes] || 0) + inc * restDesireMult);
                    eObj[targetDes] = Math.min(100, (eObj[targetDes] || 0) + Phaser.Math.Between(6, 12));
                    keys.forEach(function(k) {
                        if (k !== targetDes) g.desires[k] = Math.min(100, (g.desires[k] || 0) + Phaser.Math.Between(0, 4) * restDesireMult);
                    });
                    if (targetDes === 'a') {
                        advanceOutfit(g, 1);
                        g.wil = Math.max(0, g.wil - 18);
                        g.hp = Math.max(0, g.hp - 8);
                    }
                    if ((g.hp || 0) <= 0 && (g.wil || 0) <= 0) {
                        g.sta = Math.max(0, (g.sta || 0) - 5);
                    } else {
                        g.wil = Math.max(0, g.wil - 5);
                    }
                    this.vibeStage = Math.min(3, (this.vibeStage || 0) + (restMode ? 2 : 1));

                    this._logMsg('=== ' + eObj.name + ' acts on ' + targetDes.toUpperCase() + ' desires! (+' + inc + ') ===');
                    this._popupMsg(this.P_X, this.P_Y - 80, 0xff33aa, '+' + inc + ' LUST');

                    var mm = {
                        'm': 'cp-m',
                        'c': 'grope-b',
                        'p': 'tease-p',
                        'a': 'strip'
                    };
                    var bubbleKey2 = pickVibeSceneKey({
                        desKey: targetDes,
                        vibeStage: this.vibeStage,
                        restrained: true,
                        onFloor: true,
                        aggr: eObj.aggr || '',
                        allowTeaseVibe: false,
                        hasVibrator: !!(g.vibrator && g.vibrator.on),
                        outfit: getPortraitState(g),
                        multiEnemy: this.eList.length > 1
                    }) || mm[targetDes] || 'strip';
                    this._showBubble(bubbleKey2);

                    this.time.delayedCall(2300, function() {
                        sc._doStateRefresh();
                        playBattleVoiceCue(sc, {
                            kind: 'lewd_attack',
                            gs: g,
                            sceneTag: bubbleKey2,
                            enemyArousal: g.desires[targetDes] || 0,
                            isNude: getPortraitState(g).indexOf('nude2') >= 0,
                            onFloor: (g.hp || g.maxHp || 0) <= Math.max(20, Math.floor((g.maxHp || 100) * 0.3))
                        }, 850);
                        if (outfitRank(g) > beforeOutfitRank) {
                            playBattleVoiceCue(sc, { kind: 'torn', gs: g }, 700);
                        }
                        if (sc._shouldBattleLose()) {
                            sc._lossTrig('DEFEAT_CP');
                            return;
                        }
                        sc._checkDesireOverflow(finishEnemyTurn);
                    });
                } else {
                    if (this.anims.exists('m-walk-left')) eSpr.play('m-walk-left', true);
                    this.tweens.add({
                        targets: eSpr,
                        x: this.P_X + 60,
                        duration: 160,
                        yoyo: true,
                        ease: 'Sine.In',
                        onComplete: function() {
                            if (sc.anims.exists('m-idle-left')) eSpr.play('m-idle-left');
                            var dmgScale = battlePressureScale(g);
                            var finalDmg = Math.max(1, Math.round(eObj.dmg * dmgScale));
                            if ((g.hp || 0) <= 0 && (g.wil || 0) <= 0) {
                                g.sta = Math.max(0, (g.sta || 0) - finalDmg);
                                sc._logMsg('=== ' + eObj.name + ' strikes stamina: ' + finalDmg + ' dmg! ===');
                                sc._popupMsg(sc.P_X, sc.P_Y - 40, 0xff4422, '-' + finalDmg + ' STA');
                            } else {
                                g.hp = Math.max(0, g.hp - finalDmg);
                                sc._logMsg('=== ' + eObj.name + ' strikes: ' + finalDmg + ' dmg! ===');
                                sc._popupMsg(sc.P_X, sc.P_Y - 40, 0xff4422, '-' + finalDmg);
                            }
                            sc._popupMsg(sc.P_X, sc.P_Y - 40, 0xff4422, '-' + finalDmg);
                            var flsh = sc.add.rectangle(0, 0, sc.scale.width, sc.scale.height, 0xff0000, 0.2).setOrigin(0).setDepth(300);
                            sc.tweens.add({
                                targets: flsh,
                                alpha: 0,
                                duration: 250,
                                onComplete: function() {
                                    flsh.destroy();
                                }
                            });
                            if (!sc.pState) sc.pState = { grabbed: false, downed: false, grip: 0, down: 0, grabName: '' };
                            if (restMode) {
                                advanceOutfit(g, 999);
                                if (getPortraitState(g).indexOf('nude2') >= 0) sc._showBubble('DEFEAT_CP2');
                            }
                            if (g.hp <= Math.max(15, Math.floor((g.maxHp || 100) * 0.22)) && Math.random() < 0.45) {
                                sc._setDowned(eObj.name, 1 + Math.floor((eObj.dmg || 1) / 10));
                            } else if (Math.random() < 0.18) {
                                sc._setGrabbed(eObj.name, 1 + Math.floor((eObj.dmg || 1) / 15));
                            }
                            sc._doStateRefresh();
                            if (sc.pState && sc.pState.downed) {
                                sc.time.delayedCall(650, finishEnemyTurn);
                            } else {
                                sc.time.delayedCall(600, finishEnemyTurn);
                            }
                        }
                    });
                }
            },

            _vicTrigger: function() {
                this.myTurn = false;
                this.busy = true;
                this.passStacks = 0;
                applyBattleAftermath(this.gs, { result: 'victory', heat: -10, fatigue: -8 });
                this.gs.rep += 10;
                this.gs.outfitLock = null;
                clearBattleVibratorState(this.gs);
                if (this.sourceEnemyId) {
                    markDayDefeated(this.gs, this.sourceEnemyId);
                    clearMapEnemyCooldown(this.gs, this.sourceEnemyId);
                    clearPersistentEnemy(this.gs, this.sourceEnemyId);
                }
                stampSceneCheckpoint(this.gs, 'Corridor', this.returnPos ? { spawnX: this.returnPos.x, spawnY: this.returnPos.y } : null);
                if (this.anims.exists('syl-victory1')) this.pSpr.play('syl-victory1', true);
                this.add.text(this.scale.width / 2, this.scale.height / 2, 'VICTORY!', {
                    fontSize: '50px',
                    fill: '#d4af37',
                    fontFamily: 'Georgia',
                    fontStyle: 'italic',
                    stroke: '#000',
                    strokeThickness: 5
                }).setOrigin(0.5).setDepth(200);
                SV.write(this.gs);
                this.time.delayedCall(2000, function() {
                    var rp = this.returnPos || {};
                    var returnScene = (rp && rp.scene) ? rp.scene : 'Corridor';
                    stampSceneCheckpoint(this.gs, returnScene, { spawnX: rp.x, spawnY: rp.y, spawn: 'topCenter' });
                    this.scene.start(returnScene, {
                        gs: this.gs,
                        spawnX: rp.x,
                        spawnY: rp.y
                    });
                }.bind(this));
            },
            _lossTrig: function(ck) {
                this.myTurn = false;
                this.busy = true;
                this.passStacks = 0;
                applyBattleAftermath(this.gs, { result: 'loss', heat: 18, fatigue: 14, aftershock: 4 });
                clearBattleVibratorState(this.gs);
                stampSceneCheckpoint(this.gs, 'Bedroom', { newDay: true });
                this.cameras.main.flash(600, 200, 0, 50);
                playBattleVoiceCue(this, { kind: 'loss', gs: this.gs, stamina: this.gs.sta || 0 }, 0);
                var sc = this;
                // Show loss scene then send to bedroom as new day
                this.time.delayedCall(800, function() {
                    sc.scene.start('SceneViewer', {
                        gs: sc.gs,
                        scKey: ck,
                        toLoss: true
                    });
                });
            }
        });
