      fontFamily: 'Arial Black',
      backgroundColor: '#1f4d72',
      padding: { left: 12, right: 12, top: 7, bottom: 7 }
    }).setOrigin(0.5).setScrollFactor(0).setInteractive({ useHandCursor: true });
    ui.add(defendBtn);

    var closeBtn = scene.add.text(W * 0.50, H * 0.955, 'CLOSE', {
      fontSize: '15px',
      fill: '#ffd27d',
      fontFamily: 'Arial Black',
      backgroundColor: '#28101f',
      padding: { left: 12, right: 12, top: 6, bottom: 6 }
    }).setOrigin(0.5).setScrollFactor(0).setInteractive({ useHandCursor: true });
    ui.add(closeBtn);

    function outfitLabel() {
      if (window.getPortraitState) return window.getPortraitState(g);
      return String(g.outfitLock || 'default');
    }

    function refresh() {
      var desire = g.desires || { m: 0, c: 0, p: 0, a: 0 };
      var outfit = outfitLabel();
      var lines = buildWorkText(scene, job, g, progress, pressure, waves, outfit);
      lines.push('Shield Hits: ' + shieldHits);
      status.setText(lines.join('\n'));
      var mw = Math.max(6, (Math.min(W * 0.58, 560) - 4) * Math.max(0, Math.min(1, progress / 100)));
      meter.width = mw;
      var pw = Math.max(6, (Math.min(W * 0.58, 560) - 4) * Math.max(0, Math.min(1, pressure / 100)));
      pressureBar.width = pw;
      if (scene._refreshHUD) scene._refreshHUD();
      if (scene._updateActionUI) scene._updateActionUI();
    }

    function addDesire(amt) {
      g.desires = g.desires || { m: 0, c: 0, p: 0, a: 0 };
      g.desires[jobDesKey] = Math.max(0, Math.min(100, Number(g.desires[jobDesKey] || 0) + Number(amt || 0)));
      if (jobDesKey === 'c') {
        g.corruption = g.corruption || { m: 0, c: 0, p: 0, a: 0 };
        g.corruption.c = Math.max(0, Math.min(999, Number(g.corruption.c || 0) + Math.max(1, Math.floor(amt / 3))));
      }
    }

    function outfitDamage() {
      if (window.advanceOutfit) window.advanceOutfit(g, 1);
      addDesire(8);
      g.wil = Math.max(0, (g.wil || 0) - 6);
      g.sta = Math.max(0, (g.sta || 0) - 5);
    }

    function spawnIntruder(stronger) {
      if (finished) return;
      waves += 1;
      var edge = Phaser.Math.Between(0, 3);
      var sx = edge === 0 ? -50 : edge === 1 ? W + 50 : Phaser.Math.Between(80, W - 80);
      var sy = edge === 2 ? -50 : edge === 3 ? H + 50 : Phaser.Math.Between(90, H - 130);
      var tx = deskX + Phaser.Math.Between(-72, 72);
      var ty = deskY + Phaser.Math.Between(-20, 20);
      var icon = scene.add.sprite(sx, sy, scene.textures.exists('m-idle') ? 'm-idle' : 'm-walk').setScale(1.5).setDepth(7002).setScrollFactor(0);
      if (icon.setTint) icon.setTint(stronger ? 0xff6666 : 0xffffff);
      var mark = scene.add.text(sx, sy - 42, '!', {
        fontSize: '22px',
        fontFamily: 'Arial Black',
        fill: '#ffe16f',
        stroke: '#000',
        strokeThickness: 4
      }).setOrigin(0.5).setDepth(7003).setScrollFactor(0);
      var hp = stronger ? 2 : 1;
      var moveDur = stronger ? 1700 : 2200;
      if (scene.anims && scene.anims.exists('m-walk-down')) {
        icon.play('m-walk-down', true);
      } else if (scene.anims && scene.anims.exists('m-walk-left')) {
        icon.play('m-walk-left', true);
      }
      var t1 = scene.tweens.add({
        targets: icon,
        x: tx,
        y: ty,
        duration: moveDur,
        ease: 'Linear',
        onUpdate: function() {
          mark.x = icon.x;
          mark.y = icon.y - 42;
        },
        onComplete: function() {
          if (finished) return;
          if (hp > 0) {
            contactIntruder(icon, mark, stronger, true);
          }
        }
      });
      var t2 = scene.tweens.add({
        targets: mark,
        x: tx,
        y: ty - 42,
        duration: moveDur,
        ease: 'Linear'
      });
      intruders.push({ icon: icon, mark: mark, stronger: stronger, hp: hp, path: [t1, t2] });
      if (scene.cameras && scene.cameras.main && scene.cameras.main.shake) scene.cameras.main.shake(80, 0.0025);
    }

    function clearIntruder(idx, burst) {
      var obj = intruders[idx];
      if (!obj) return;
      if (obj.path && obj.path.forEach) {
        obj.path.forEach(function(t) { if (t && t.stop) t.stop(); });
      }
      if (burst && scene.cameras && scene.cameras.main && scene.cameras.main.flash) {
        scene.cameras.main.flash(50, 255, 255, 255);
      }
      if (obj.icon && obj.icon.destroy) obj.icon.destroy();
      if (obj.mark && obj.mark.destroy) obj.mark.destroy();
      intruders.splice(idx, 1);
    }

    function contactIntruder(icon, mark, stronger, arrived) {
      if (finished || locked) return;
      locked = true;
      stage = Math.min(3, stage + 1);
      pressure = Math.min(100, pressure + (stronger ? 24 : 16));
      addDesire(stronger ? 10 : 6);
      shieldHits += 1;
      g.hp = Math.max(0, (g.hp || 0) - (stronger ? 8 : 4));
      g.sta = Math.max(0, (g.sta || 0) - (stronger ? 7 : 4));
      g.wil = Math.max(0, (g.wil || 0) - (stronger ? 10 : 6));

      outfitDamage();
      outfitDamage();

      var sceneKey = getInterruptScene(job, stage, (window.getPortraitState ? window.getPortraitState(g) : 'default') === 'nude2', stronger || pressure >= 70);
      if (window.playBattleVoiceCue) window.playBattleVoiceCue(scene, { kind: 'scene', gs: g, sceneTag: sceneKey }, 550);

      if (window.showMapSceneOverlay) {
        window.showMapSceneOverlay(scene, sceneKey, stronger ? 'The intruder overwhelms the desk.' : 'The intruder gets close enough to interfere.', function() {
          if (icon && icon.destroy) icon.destroy();
          if (mark && mark.destroy) mark.destroy();
          for (var i = intruders.length - 1; i >= 0; i--) {
            if (intruders[i] && intruders[i].icon === icon) intruders.splice(i, 1);
          }
          if (stronger) {
            outfitDamage();
          }
          locked = false;
          refresh();
        });
      } else {
        if (icon && icon.destroy) icon.destroy();
        if (mark && mark.destroy) mark.destroy();
        locked = false;
      }
    }

    function triggerInterrupt(force) {
      if (finished) return;
      var stronger = force || pressure >= 65 || stage >= 2;
      spawnIntruder(stronger);
      if (pressure >= 85 || stage >= 3) {
        spawnIntruder(true);
      }
    }

    function completeShift(success) {
      if (finished) return;
      finished = true;
      workBtn.disableInteractive();
      rushBtn.disableInteractive();
      defendBtn.disableInteractive();
      closeBtn.disableInteractive();

      var outfit = outfitLabel();
      var successScene = getFinishScene(job, success, outfit === 'nude2', stage);
      if (window.playBattleVoiceCue) window.playBattleVoiceCue(scene, { kind: 'scene', gs: g, sceneTag: successScene }, 650);

      if (window.showMapSceneOverlay) {
        window.showMapSceneOverlay(scene, successScene, success ? 'Shift complete.' : 'Shift failed.', function() {
          var exp = success ? 24 : 8;
          g.exp = Math.max(0, Number(g.exp || 0) + exp);
          g.rep = Math.max(0, Math.min(100, Number(g.rep || 0) + (success ? 3 : 0)));
          g.notes = Math.max(0, Number(g.notes || 0) + (success ? 1 : 0));
          g.taskTier = Math.max(0, Number(g.taskTier || 0) + (success ? 1 : 0));
          if (success) g.favors = Math.max(0, Number(g.favors || 0) + 1);
          if (window.grantMapExp) window.grantMapExp(g, 0); // preserve save sync path
          if (window.SV && window.SV.write) {
            try { window.SV.write(g); } catch (e) {}
          }
          if (window.restoreMapEventPosition) window.restoreMapEventPosition(scene);
          scene.inTrans = false;
          scene._deskJobActive = false;
          ui.destroy(true);
        });
      } else {
        if (window.restoreMapEventPosition) window.restoreMapEventPosition(scene);
        scene.inTrans = false;
        scene._deskJobActive = false;
        ui.destroy(true);
      }
    }

    function doWork(rush) {
      if (finished) return;
      clicks += 1;
      pressure = Math.min(100, pressure + (rush ? 14 : 8));
      progress += rush ? 12 : 9;
      g.sta = Math.max(0, (g.sta || 0) - (rush ? 2 : 1));
      g.wil = Math.max(0, (g.wil || 0) - (rush ? 2 : 1));
      addDesire(rush ? 4 : 2);

      if (clicks % 2 === 0) {
        spawnIntruder(pressure >= 50 || clicks >= 4);
      }
      if (pressure >= 55 && Math.random() < 0.65) spawnIntruder(true);
      if (pressure >= 78 && Math.random() < 0.9) spawnIntruder(true);

      if (progress >= 100) {
        completeShift(true);
        return;
      }

      if (pressure >= 92 || g.hp <= 0 || g.sta <= 0) {
        completeShift(false);
        return;
      }
      refresh();
    }

    function defend() {
      if (finished) return;
      pressure = Math.max(0, pressure - 16);
      if (intruders.length) {
        var obj = intruders.shift();
        if (obj && obj.icon && obj.icon.destroy) obj.icon.destroy();
        if (obj && obj.mark && obj.mark.destroy) obj.mark.destroy();
        shieldHits += 1;
      }
      g.wil = Math.min(g.maxWil || 100, Number(g.wil || 0) + 1);
      addDesire(1);
      if (Math.random() < 0.35) spawnIntruder(false);
      refresh();
    }

    workBtn.on('pointerdown', function() { doWork(false); });
    rushBtn.on('pointerdown', function() { doWork(true); });
    defendBtn.on('pointerdown', function() { defend(); });
    closeBtn.on('pointerdown', function() {
      if (finished) return;
      completeShift(false);
    });

    scene.time.addEvent({
      delay: 900,
      loop: true,
      callback: function() {
        if (finished || locked) return;
        pressure = Math.min(100, pressure + 2);
        if (pressure >= 48 && Math.random() < 0.45) spawnIntruder(pressure >= 66);
        if (pressure >= 88) spawnIntruder(true);
        if (pressure >= 95) completeShift(false);
        refresh();
      }
    });

    scene.input.once('pointerdown', function() {
      if (!finished && !locked) doWork(false);
    });

    refresh();
  }

  window.runDeskJobShift = runDeskJobShift;

  if (window.FrontdeskScene && Array.isArray(window.FrontdeskScene.actions)) {
    for (var i = 0; i < window.FrontdeskScene.actions.length; i++) {
      var a = window.FrontdeskScene.actions[i];
      if (a && a.type === 'work') {
        a.zone = [0.31, 0.48, 0.38, 0.18];
        a.label = '[ LONG DESK WORK ]';
        a.short = 'DESK';
        a.desc = 'Use the center desk for a pressure shift.';
      }
    }
  }

  var _oldApplyRoomAction = window.applyRoomAction;
  window.applyRoomAction = function(scene, act) {
    if (scene && act && String(act.type || '').toLowerCase() === 'work') {
      return runDeskJobShift(scene, act);
    }
    return _oldApplyRoomAction ? _oldApplyRoomAction.apply(this, arguments) : undefined;
  };
})();
</script>
