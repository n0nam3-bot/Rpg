            font-size: .95rem;
            letter-spacing: 3px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            -webkit-appearance: none;

            margin-top: 12px;
            font-size: .82rem;
            min-height: 18px;
        }

            color: #ff6666;

        #game {

        function freezeMapPlayer(scene) {
            if (!scene || !scene.player) return;
            if (!scene._eventReturnPos) {
                scene._eventReturnPos = {
                    x: scene.player.x,
                    y: scene.player.y,
                    scene: scene.scene && scene.scene.key ? scene.scene.key : ''
                };
            }
            if (scene.player.setVelocity) scene.player.setVelocity(0, 0);
            if (scene.player.setAcceleration) scene.player.setAcceleration(0, 0);
            if (scene.player.body && scene.player.body.stop) scene.player.body.stop();
            if (scene.player.body && scene.player.body.reset) scene.player.body.reset(scene.player.x, scene.player.y);
        }

        function restoreMapEventPosition(scene) {
            if (!scene || !scene.player || !scene._eventReturnPos) return;
            var p = scene._eventReturnPos;
            scene.player.setVelocity(0, 0);
            if (scene.player.setPosition) scene.player.setPosition(p.x, p.y);
            if (scene.player.body && scene.player.body.reset) scene.player.body.reset(p.x, p.y);
            if (scene.cameras && scene.cameras.main && scene.cameras.main.startFollow) {
                scene.cameras.main.startFollow(scene.player, true, 0.1, 0.1);
            }
            scene._eventReturnPos = null;
        }

                var local = null;
                try {

                    if (cb) cb(d);

            var wConv = 44 + bias.conversation + (rep * 0.20) + (control * 0.12) - (corr * 0.04) - (heat * 0.04);
            var wH = 20 + bias.hscene + (corr * 0.18) + (heat * 0.05) - (control * 0.06);

            if (status === 'lockdown') {
                wBattle += 24; wConv -= 10; wH -= 8;

            var note = '';
            var behavior = '';
            var specialScene = '';
            var desKey = getConversationDesireKey(topic, choice);

                if (choice === 'calm') { rep += 2; control += 1; desGain = 3; note = 'You soothed the pressure.'; }
                else if (choice === 'assert') { rep -= 2; heat += 2; desGain = 2; note = 'You challenged authority.'; }
                else { corr += 2; heat += 1; desGain = 4; note = 'You turned authority into teasing.'; behavior = 'strip'; }
            } else if (topic === 'appeal') {
                if (choice === 'calm') { rep += 3; fatigue -= 1; desGain = 3; note = 'Your answer felt sincere.'; }
                else if (choice === 'assert') { rep += 1; control += 1; heat += 1; desGain = 2; note = 'You negotiated the terms.'; }
                else { corr += 1; rep += 1; desGain = 4; note = 'You made the exchange personal.'; behavior = (roomKey === 'bedroom' || roomKey === 'visitation') ? 'bed' : 'follow'; }
            } else if (topic === 'social') {
                if (choice === 'calm') { rep += 2; control += 1; desGain = 2; note = 'You lowered the room tension.'; }
                else if (choice === 'assert') { rep += 1; heat += 1; desGain = 2; note = 'You stood your ground.'; }
                else { corr += 3; heat += 1; desGain = 3; note = 'You leaned into temptation.'; behavior = 'follow'; }
            } else if (topic === 'discipline') {
                if (choice === 'calm') { control += 3; rep += 1; desGain = 2; note = 'You stabilized the exchange.'; }
                else if (choice === 'assert') { control += 1; heat += 2; desGain = 2; note = 'You pushed back hard.'; behavior = 'strip'; }
                else { corr += 1; heat += 1; desGain = 3; note = 'You softened the edge.'; }
            } else if (topic === 'temptation') {
                if (choice === 'calm') { control += 1; rep += 1; desGain = 2; note = 'You held your line.'; }
                else if (choice === 'assert') { heat += 1; desGain = 3; note = 'You bargained through it.'; }
                else { corr += 2; heat += 2; desGain = 4; note = 'You yielded to the moment.'; behavior = (roomKey === 'bedroom' ? 'bed' : 'follow'); }
            } else {
                if (choice === 'calm') { rep += 1; control += 1; desGain = 2; note = 'You kept the situation steady.'; }
                else if (choice === 'assert') { heat += 1; desGain = 2; note = 'You answered sharply.'; }
                else { corr += 1; heat += 1; desGain = 3; note = 'You let the mood shift.'; behavior = 'follow'; }
            }

            if (!behavior && roomKey === 'bedroom' && choice === 'flirt') behavior = 'bed';
            if (!behavior && roomKey === 'lunchroom' && choice === 'flirt') behavior = 'follow';
            if (!behavior && roomKey === 'visitation' && choice === 'flirt') behavior = 'bed';

            gs.rep = clampValue(Number(gs.rep || 0) + rep, 0, 100);
            gs.control = clampValue(Number(gs.control != null ? gs.control : gs.discipline || 0) + control, 0, 100);
            gs.discipline = clampValue(Number(gs.discipline || 0) + Math.max(0, control), 0, 100);
            gs.battleHeat = clampValue(Number(gs.battleHeat || 0) + heat, 0, 999);
            gs.fatigue = clampValue(Number(gs.fatigue || 0) + fatigue, 0, 999);
            gs.desires = gs.desires || { m: 0, c: 0, p: 0, a: 0 };
            if (desKey) {

            if (behavior) gs.lastConversationBehavior = behavior;

            var role = String(base.role || 'generic').toLowerCase();
            var pressure = Number(base.pressure || 1);
            var heat = Number(gs && gs.battleHeat || 0);
            var corr = corruptionAverage(gs || {});
            var wave = 1 + (Math.max(0, total - 1) * 0.08) + (idx * 0.05);
            var pressureScale = 1 + (heat / 240) + (corr / 250);
            var hpMul = pressure * wave * pressureScale;
            var dmgMul = pressure * (1 + (heat / 400));
            var spdMul = 1 + (heat / 500);

            if (role === 'sentinel') {

                dmgMul *= 1.10;
            } else if (role === 'skirmisher') {
                hpMul *= 0.88;
                dmgMul *= 0.90;
                spdMul *= 1.12;
            } else if (role === 'dominator') {

                dmgMul *= 1.16;
                spdMul *= 0.95;
            } else if (role === 'captain') {
                hpMul *= 1.28;
                dmgMul *= 1.20;
                spdMul *= 0.98;
            }

            base.maxHp = Math.max(1, Math.round((base.hp || 1) * hpMul));
            base.hp = base.maxHp;
            base.dmg = Math.max(1, Math.round((base.dmg || 1) * dmgMul));
            base.spd = Math.max(1, Math.round((base.spd || 1) * spdMul));
            base.m = 0;
            base.c = 0;
            base.p = 0;
            base.a = 0;

            base.pressure = pressure;
            base.wave = wave;
            base.heatScale = pressureScale;
            return base;
        }

            if (desKey === 'c' && onFloor && isPartialOrNude && restrained) return 'grab-grope-b';
            if (restrained || onFloor) {
                if (!hasVibrator) {
                    if (desKey === 'm' && aggrHigh) return isPartialOrNude ? 'grab-cp-pm' : 'oral3';
                    if (desKey === 'p' && aggrHigh) return isPartialOrNude ? 'grab-p' : 'cp-p1';
                    if (isPartialOrNude) return opts.multiEnemy ? 'ride-dp' : 'grab-ap';
                    return 'strip';
                }
                if (vibe >= 3) return 'vibe3';
                if (vibe === 2) return 'vibe2';
                return 'vibe1';
            }
            return null;
        }

        function pickBattleCueGroup(ctx) {
            ctx = ctx || {};
            var tier = ctx.tier || corruptionTier(ctx.gs);
            var avg = (ctx.avg != null) ? ctx.avg : corruptionAverage(ctx.gs);
            var sceneTag = String(ctx.sceneTag || ctx.sceneName || '');
            var isNude = !!ctx.isNude;
            var onFloor = !!ctx.onFloor;
            if (/scene[-_ ]?(oral|oral2|group|group2|group2[-_ ]?cp|sleep)/i.test(sceneTag)) {
                return 'battle_scene_mmm';
            }
            if (/scene[-_ ]?(group3|ride2[-_ ]?2)/i.test(sceneTag)) {
                return 'battle_scene_ugh';
            }


            if (ctx.kind === 'encounter') {
                return {
                    very_low: 'battle_pre_vlow',
                    low: 'battle_pre_low',
                    medium: 'battle_pre_med',
                    high: 'battle_pre_high',
                    very_high: 'battle_pre_vhigh'
                }[tier] || 'battle_pre_vlow';
            }

            if (ctx.kind === 'player_attack') {
                return ctx.finisher ? 'battle_player_attack_finisher' : 'battle_player_attack';
            }

            if (ctx.kind === 'lewd_attack') {
                if (Number(ctx.enemyArousal || 0) >= 80) return 'battle_lewd_showme';
                if (tier === 'very_high') {
                    if (isNude && onFloor) return 'battle_lewd_vhigh_nude_floor';
                    if (isNude) return 'battle_lewd_vhigh_nude';
                    return 'battle_lewd_vhigh';
                }
                if (tier === 'high') return 'battle_lewd_high';
                if (tier === 'medium') return 'battle_lewd_med';
                if (tier === 'low') return 'battle_lewd_low';
                return 'battle_lewd_vlow';
            }

            if (ctx.kind === 'torn') return 'battle_torn';

            if (ctx.kind === 'low_stamina') {
                if (avg <= 25 && Number(ctx.stamina || 0) <= 15) return 'battle_lowsta_lowcorr';
                return 'battle_lowsta';
            }

            if (ctx.kind === 'loss') {
                if (Number(ctx.stamina || 0) <= 15) {
                    if (avg <= 25) return 'battle_lowsta_lowcorr';
                    return 'battle_lowsta';
                }
                return 'battle_loss';
            }

            if (ctx.kind === 'defeat') {
                return 'battle_defeat';
            }

            if (ctx.kind === 'capture') return 'capture';
            if (ctx.kind === 'training') return 'control';

            if (ctx.kind === 'scene') {
                if (/scene[-_ ]?(oral|oral2|group|group2|group2[-_ ]?cp|sleep)/i.test(sceneTag)) {
                    return 'battle_scene_mmm';
                }
                if (/scene[-_ ]?(group3|ride2[-_ ]?2)/i.test(sceneTag)) {
                    return 'battle_scene_ugh';
                }
            }

            return null;
        }

        function playBattleVoiceCue(scene, ctx, cooldownMs) {
            var group = pickBattleCueGroup(ctx);
            if (!group) return false;

            var forceScene = group === 'battle_scene_mmm' || group === 'battle_scene_ugh';
            if (forceScene && scene && scene.sound && scene.sound.stopAll) {
                scene.sound.stopAll();
            }
            return playVoiceCue(scene, group, cooldownMs || 850, {
                force: forceScene,
                stopAllAudio: forceScene
            });
        }

            return 'control';
        }

        function addJobProgress(gs, kind, success) {
            if (!gs) return;
            if (!gs.jobProgress) gs.jobProgress = { frontdesk: 0, lunchroom: 0, visitation: 0, shifts: 0 };
            if (!kind) kind = 'frontdesk';
            var base = success ? 1 : -1;
            gs.jobProgress[kind] = Math.max(0, (gs.jobProgress[kind] || 0) + base);
            gs.jobProgress.shifts = Math.max(0, (gs.jobProgress.shifts || 0) + (success ? 1 : 0));
        }

        function finishJobShift(scene, cfg, result) {
            if (!scene || !scene.gs) return;
            var g = scene.gs;
            var kind = cfg.kind || 'frontdesk';
            var success = !!(result && result.success);
            var streak = Number(result && result.streak || 0);
            var score = Number(result && result.score || 0);
            var msg = result && result.msg ? String(result.msg) : 'Shift complete.';

            addJobProgress(g, kind, success);

            if (kind === 'frontdesk') {
                g.taskTier = clampValue((g.taskTier || 0) + (success ? 1 : 0), 0, 99);
                g.rep = clampValue((g.rep || 0) + (success ? 2 + Math.floor(streak / 2) : 1), 0, 100);
                g.notes = (g.notes || 0) + (success ? 1 : 0);
                g.wil = clampValue((g.wil || 0) + (success ? 4 : -4), 0, g.maxWil);
                g.sta = clampValue((g.sta || 0) - (success ? 6 : 10), 0, g.maxSta);
                g.exp = (g.exp || 0) + (success ? 18 + (score * 2) : 7);
                setSceneToast(scene, success ? 'Front desk shift finished cleanly.' : 'Front desk shift was rough.');
            } else if (kind === 'lunchroom') {
                g.rep = clampValue((g.rep || 0) + (success ? 2 : 1), 0, 100);
                g.hp = clampValue((g.hp || 0) + (success ? 4 : 0), 0, g.maxHp);
                g.sta = clampValue((g.sta || 0) + (success ? 5 : -4), 0, g.maxSta);
                g.wil = clampValue((g.wil || 0) + (success ? 2 : -2), 0, g.maxWil);
                g.hunger = clampValue((g.hunger || 0) - (success ? 18 : 6), 0, 100);
                g.exp = (g.exp || 0) + (success ? 16 + (score * 2) : 6);
                setSceneToast(scene, success ? 'Waitress shift kept the room moving.' : 'Service slipped under pressure.');
            } else if (kind === 'visitation') {
                g.favors = (g.favors || 0) + (success ? 1 : 0);

            while (g.exp >= g.lvl * 100) {
                g.exp -= g.lvl * 100;

                g.maxHp += 5;
                g.maxSta += 5;
                g.maxWil += 5;

                g.sta = g.maxSta;

                grantSkillPoint(g, 1, 'Level up bonus');

            if (scene._refreshHUD) scene._refreshHUD();

        function runJobShift(scene, cfg) {
            if (!scene || !scene.add || !scene.time || !scene.gs) return false;

            scene.jobShiftActive = true;
            scene.inTrans = true;

            var g = scene.gs;

            var score = 0, streak = 0, done = 0, totalCorrect = 0, totalWrong = 0;
            var panel = scene.add.container(0, 0).setScrollFactor(0).setDepth(5000);
            var dim = scene.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0.70).setScrollFactor(0);

            var box = scene.add.rectangle(W / 2, H / 2, Math.min(W * 0.88, 760), Math.min(H * 0.78, 620), 0x100816, 0.98).setStrokeStyle(3, 0x9b59b6).setScrollFactor(0);
            panel.add(box);

            panel.add(sub);
            var status = scene.add.text(W / 2, H * 0.31, '', { fontSize: '18px', fill: '#ffd27d', fontFamily: 'Arial Black', align: 'center' }).setOrigin(0.5).setScrollFactor(0);
            panel.add(status);
            var prompt = scene.add.text(W / 2, H * 0.40, '', { fontSize: '24px', fill: '#ffffff', fontFamily: 'Arial Black', align: 'center', wordWrap: { width: 620 } }).setOrigin(0.5).setScrollFactor(0);
            panel.add(prompt);
            var meterBg = scene.add.rectangle(W / 2, H * 0.49, 420, 18, 0x2a1736, 1).setStrokeStyle(2, 0x8a2be2).setScrollFactor(0);
            var meter = scene.add.rectangle(W / 2 - 210, H * 0.49, 0, 18, 0xff5aa9, 1).setOrigin(0, 0.5).setScrollFactor(0);
            panel.add(meterBg); panel.add(meter);
            var timerTxt = scene.add.text(W / 2, H * 0.53, '', { fontSize: '14px', fill: '#ddd', fontFamily: 'Arial Black' }).setOrigin(0.5).setScrollFactor(0);
            panel.add(timerTxt);
            var btnY = H * 0.66;
            var btnW = 180, btnH = 54;
            var buttons = [];
            var current = null;
            var roundTimer = null;
            var progressTimer = null;
            var phase = 0;

            function cleanup() {
                if (roundTimer && roundTimer.remove) roundTimer.remove(false);
                if (progressTimer && progressTimer.remove) progressTimer.remove(false);
                buttons.forEach(function(b) { if (b && b.destroy) b.destroy(); });
                if (panel && panel.destroy) panel.destroy(true);
                scene.jobShiftActive = false;
                scene.inTrans = false;
            }

            function makeBtn(i, label, x) {
                var b = scene.add.text(x, btnY, label, { fontSize: '18px', fill: '#ffffff', fontFamily: 'Arial Black', backgroundColor: '#3a1a5a', padding: { left: 14, right: 14, top: 8, bottom: 8 }, align: 'center' }).setOrigin(0.5).setScrollFactor(0).setDepth(5002).setInteractive({ useHandCursor: true });
                b.on('pointerdown', function() { choose(i); });
                buttons.push(b);
                panel.add(b);
            }

            labels.forEach(function(l, i) { makeBtn(i, l, W * (0.28 + i * 0.22)); });

            function updatePrompt() {
                var templates = cfg.templates || [];
                if (phase >= rounds) { finish(); return; }
                current = templates[Phaser.Math.Between(0, templates.length - 1)] || { text: 'Match the prompt', answer: 0 };
                prompt.setText(current.text || 'Match the prompt');
                status.setText('Round ' + (phase + 1) + ' / ' + rounds + '  |  Streak ' + streak + '  |  Score ' + score);
                meter.setScale(0, 1);
                timerTxt.setText('');
                var start = scene.time.now;
                if (progressTimer && progressTimer.remove) progressTimer.remove(false);
                progressTimer = scene.time.addEvent({ delay: 32, loop: true, callback: function() {
                    var p = Math.min(1, (scene.time.now - start) / timeMs);
                    meter.setScale(p, 1);
                    timerTxt.setText('Time: ' + Math.max(0, Math.ceil((timeMs - (scene.time.now - start)) / 1000)) + 's');
                    if (p >= 1) {
                        totalWrong += 1;
                        streak = 0;
                        phase += 1;
                        status.setText('Too slow.');
                        updatePrompt();
                    }
                }});
            }

            function choose(i) {
                if (!current) return;
                if (progressTimer && progressTimer.remove) { progressTimer.remove(false); progressTimer = null; }
                var ok = i === current.answer;
                if (ok) {
                    totalCorrect += 1;
                    streak += 1;
                    score += 1 + Math.floor(streak / 2);
                    status.setText('Correct.');
                } else {
                    totalWrong += 1;
                    streak = 0;
                    status.setText('Wrong item.');
                }
                phase += 1;
                scene.time.delayedCall(120, updatePrompt);
            }

            function finish() {
                cleanup();
                var success = totalCorrect >= Math.ceil(rounds * 0.6);
                var msg = success ? (cfg.success || 'Shift successful.') : (cfg.fail || 'Shift was rough.') ;
                finishJobShift(scene, cfg, { success: success, score: score, streak: streak, msg: msg });
            }

            updatePrompt();
            roundTimer = scene.time.delayedCall(timeMs * rounds + 1200, function() {
                if (scene.jobShiftActive) finish();
            });
            return true;
        }

        function getPortraitState(gs) {
            if (!gs || !gs.desires) return 'default';
            var totalDes = (gs.desires.m || 0) + (gs.desires.c || 0) + (gs.desires.p || 0) + (gs.desires.a || 0);
            var baseOutfit = 'default';

            if (totalDes > 320) baseOutfit = 'nude2';
            else if (totalDes > 240) baseOutfit = 'nude2';
            else if (totalDes > 160) baseOutfit = 'partial';
            else if (totalDes > 80) baseOutfit = 'shredded';
            else if (totalDes > 30) baseOutfit = 'torn';

            var ORDER = ['default', 'torn', 'shredded', 'partial', 'nude2'];
            var lockIdx = ORDER.indexOf(gs.outfitLock || 'default');
            var baseIdx = ORDER.indexOf(baseOutfit);

            if (baseIdx > lockIdx) {
                gs.outfitLock = baseOutfit;
            }
            var outfit = gs.outfitLock || baseOutfit;

            if ((gs.hp || 100) <= gs.maxHp * 0.2) {
                if (outfit === 'default' || outfit === 'torn') return 'knees';
                if (outfit === 'shredded' || outfit === 'partial') return 'knees2';
                return 'knees3';
            }
            return outfit;
        }

        function getEnemyArousalScore(enemy) {
            if (!enemy) return 0;
            return (enemy.m || 0) + (enemy.c || 0) + (enemy.p || 0) + (enemy.a || 0);
        }

        function isEnemyHorny(enemy) {
            return getEnemyArousalScore(enemy) >= 180;
        }

        function getEnemyAggressionLabel(enemy) {
            if (!enemy) return 'UNKNOWN';
            var base = String(enemy.aggr || '').toUpperCase();
            return base + (isEnemyHorny(enemy) ? ' (horny)' : '');
        }

        function getBattleHoldLabel(gs, pState, vibeStage) {
            var parts = [];
            if (pState && pState.downed) parts.push('KD');
            else if (pState && pState.grabbed) parts.push('GRAB');
            var vibOn = !!(gs && gs.vibrator && gs.vibrator.on);
            var stage = vibOn ? Math.max(1, Math.min(3, Number((gs && gs.vibrator && gs.vibrator.stage) || vibeStage || 1))) : 0;
            if (stage > 0) parts.push('V' + stage);
            return parts.join(' · ');
        }

        function getStanceLabel(gs, pState) {
            var state = pState || (gs && gs.pState) || null;
            var vibOn = !!(gs && gs.vibrator && gs.vibrator.on);
            var stage = vibOn ? Math.max(1, Math.min(3, Number((gs && gs.vibrator && gs.vibrator.stage) || 1))) : 0;

            if (state && state.downed) {
                return { lbl: 'KD' + (stage ? ' · V' + stage : ''), color: '#ffaa44' };
            }
            if (state && state.grabbed) {
                return { lbl: 'GRAB' + (stage ? ' · V' + stage : ''), color: '#ff77aa' };
            }
            if (stage > 0) {
                return { lbl: 'V' + stage, color: '#ff66cc' };
            }
            return { lbl: 'FREE', color: '#88aacc' };
        }

        function drawCorrDots(gfx, barX, barY, barW, corrVal) {
            gfx.clear();
            var info = getDesireStageInfo(corrVal);
            if (!info || info.stage <= 0 || info.count <= 0) return;

            var stage = info.stage;
            var count = info.count;
            var spacing = barW / 10;
            var baseX = barX + spacing * 0.5;
            var fill = info.fill;
            var glow = info.glow;

            function drawTriangle(cx, cy, size) {
                gfx.fillStyle(fill, 1);
                gfx.fillTriangle(cx, cy - size, cx - size, cy + size, cx + size, cy + size);
            }

            function drawDiamond(cx, cy, size) {
                gfx.fillStyle(fill, 1);
                gfx.fillTriangle(cx, cy - size, cx - size, cy, cx, cy + size);
                gfx.fillTriangle(cx, cy - size, cx + size, cy, cx, cy + size);
            }

            function drawSquare(cx, cy, size) {
                gfx.fillStyle(fill, 1);
                gfx.fillRect(cx - size, cy - size, size * 2, size * 2);
            }

            function drawHex(cx, cy, size) {
                gfx.fillStyle(fill, 1);
                gfx.fillPoints([
                    new Phaser.Geom.Point(cx - size, cy),
                    new Phaser.Geom.Point(cx - size * 0.5, cy - size),
                    new Phaser.Geom.Point(cx + size * 0.5, cy - size),
                    new Phaser.Geom.Point(cx + size, cy),
                    new Phaser.Geom.Point(cx + size * 0.5, cy + size),
                    new Phaser.Geom.Point(cx - size * 0.5, cy + size)
                ], true);
            }

            function drawHeart(cx, cy, size, glowOn) {
                if (glowOn) {
                    gfx.fillStyle(0xff77dd, 0.22);
                    gfx.fillCircle(cx, cy, size + 5);
                }
                gfx.fillStyle(fill, 1);
                gfx.fillCircle(cx - size * 0.65, cy - size * 0.2, size * 0.72);
                gfx.fillCircle(cx + size * 0.65, cy - size * 0.2, size * 0.72);
                gfx.fillTriangle(cx - size * 1.25, cy, cx + size * 1.25, cy, cx, cy + size * 1.65);
                if (glowOn) {
                    gfx.fillStyle(0xffffff, 0.30);
                    gfx.fillCircle(cx, cy, 1.4);
                }
            }

            for (var i = 0; i < count; i++) {
                var x = baseX + spacing * i;
                var y = barY - 4;
                var size = 3;
                if (stage === 1) {
                    gfx.fillStyle(fill, 1);
                    gfx.fillCircle(x, y, size + 0.5);
                } else if (stage === 2) {
                    drawTriangle(x, y, size + 1);
                } else if (stage === 3) {
                    drawDiamond(x, y, size + 1);
                } else if (stage === 4) {
                    drawSquare(x, y, size);
                } else if (stage === 5) {
                    drawHex(x, y, size + 1);
                } else if (stage === 6) {
                    drawHeart(x, y, size, false);
                } else {
                    drawHeart(x, y, size + 1, true);
                }
            }
        }

        function getDesireStageInfo(value) {
            var v = Math.max(0, Math.min(70, Number(value || 0)));
            if (v <= 0) return { stage: 0, count: 0, glyph: '', fill: 0xff66cc, glow: false };
            var stage = Math.min(7, Math.max(1, Math.ceil(v / 10)));
            var count = v % 10;
            if (count === 0) count = 10;
            var colors = [0xff66cc, 0xff5fbf, 0xff53b5, 0xff4aad, 0xff419f, 0xff3d96, 0xff9ae8];
            return {
                stage: stage,
                count: count,
                glyph: getDesireStageGlyph(stage),
                fill: colors[Math.min(colors.length - 1, stage - 1)] || 0xff66cc,
                glow: stage >= 7
            };
        }

        function getDesireStageGlyph(stage) {
            stage = Math.max(1, Math.min(7, Number(stage || 1)));
            if (stage === 1) return '○';
            if (stage === 2) return '△';
            if (stage === 3) return '◇';
            if (stage === 4) return '□';
            if (stage === 5) return '⬢';
            if (stage === 6) return '♥';
            return '✦';
        }

        function syncDesireReadout(scene, dsKey, value, x, y, w) {
            if (!scene || !scene.add) return;
            scene.corrReadouts = scene.corrReadouts || {};
            var txt = scene.corrReadouts[dsKey];
            var v = Math.max(0, Math.min(70, Number(value || 0)));
            var info = getDesireStageInfo(v);
            var label = 'L' + String(v).padStart(2, '0') + '  ' + (info.glyph || '·') + '  S' + (info.stage || 0);
            var needsRebuild = !txt || !txt.active || !txt.scene;
            if (needsRebuild) {
                if (txt && txt.destroy) txt.destroy();
                txt = scene.add.text((x || 0) + (w || 0) + 10, y || 0, label, {
                    fontSize: '11px',
                    fontFamily: 'Arial Black',
                    fill: '#ffffff',
                    stroke: '#000000',
                    strokeThickness: 3
                }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(10004);
                scene.corrReadouts[dsKey] = txt;
            } else {
                txt.setText(label);
                txt.setPosition((x || 0) + (w || 0) + 10, y || 0);
                txt.setVisible(true);
                if (txt.setDepth) txt.setDepth(10004);
            }
        }

        function queuePersistentEnemy(scene, e, behavior) {
            if (!scene || !scene.gs || !e) return;
            scene.gs.mapFollower = {
                enemyId: e.enemyId,
                roomKey: e.roomKey || '',
                behavior: String(behavior || 'follow'),
                ecfg: e.ecfg ? Object.assign({}, e.ecfg) : null,
                x: e.x,
                y: e.y,
                active: true,
                contactCount: Number(e.followContactCount || 0),
                followDesire: Number(e.followDesire || 100)
            };
        }

        function clearPersistentEnemy(sceneOrGs, enemyId) {
            var gs = sceneOrGs && sceneOrGs.gs ? sceneOrGs.gs : sceneOrGs;
            if (!gs || !gs.mapFollower) return;
            if (!enemyId || gs.mapFollower.enemyId === enemyId) gs.mapFollower = null;
        }

        function spawnPersistentFollower(scene, cfg, WW, WH) {
            if (!scene || !scene.gs || !scene.gs.mapFollower || !scene.gs.mapFollower.active || !scene.enemies) return null;
            var pf = scene.gs.mapFollower;
            if (isDayDefeated(scene.gs, pf.enemyId)) return null;
            if (scene.scene && scene.scene.key && String(scene.scene.key).toLowerCase() === 'battle') return null;
            var x = Number(pf.x != null ? pf.x : (WW * 0.5));
            var y = Number(pf.y != null ? pf.y : (WH * 0.5));
            var e = spawnMapEnemy(scene, {
                x: x,
                y: y,
                id: pf.enemyId,
                roomKey: cfg && cfg.key ? cfg.key : '',
                type: pf.ecfg && pf.ecfg.key ? pf.ecfg.key : null,
                pool: pf.ecfg && pf.ecfg.key ? [pf.ecfg.key] : (cfg && cfg.enemies && cfg.enemies[0] && cfg.enemies[0].pool) || DATA.encounters[0].pool,
                roamSpeed: 28,
                range: 230,
                fov: 80,
                encounterType: pf.behavior === 'strip' ? 'hscene' : 'conversation',
                followPlayer: true,
                followBehavior: pf.behavior || 'follow'
            });
            if (e) {
                e.followPlayer = true;
                e.followBehavior = pf.behavior || 'follow';
                e.followSticky = true;
                e.followContactCount = Number(pf.contactCount || 0);
                e.followDesire = Number(pf.followDesire || 100);
                e.roamSpeed = 32;
                e.range = Math.max(230, e.range || 0);
            }
            return e;
        }

        function fitToBox(scene, spr, texKey, w, h) {
            if (!scene || !scene.textures.exists(texKey)) return;
            var frame;
            if (scene.textures.get(texKey).frameTotal > 1) {
                frame = scene.textures.get(texKey).get(0);
            } else {
                frame = scene.textures.get(texKey).getSourceImage();
            }
            if (!frame || frame.width === 0) return;
            var scale = Math.min((w - 4) / frame.width, (h - 4) / frame.height);

            if (spr.texture.key !== texKey) spr.setTexture(texKey);
            spr.setOrigin(0.5).setScale(scale);

            if (scene.anims.exists(texKey + '-anim')) spr.play(texKey + '-anim', true);
            else {
                if (spr.anims && spr.anims.isPlaying) spr.stop();
                if (spr.setFrame) spr.setFrame(0);
            }
        }

                    frames: sc.anims.generateFrameNumbers('m-idle', {
                        start: r * 12,
                        end: r * 12 + 11
                    }),
                    frameRate: 5,

                });
                if (sc.textures.exists('m-walk') && !sc.anims.exists('m-walk-' + d)) sc.anims.create({
                    key: 'm-walk-' + d,
                    frames: sc.anims.generateFrameNumbers('m-walk', {
                        start: r * 12,

                    }),

                });

            if (sc.textures.exists('syl-idle') && !sc.anims.exists('syl-idle')) sc.anims.create({

                frames: sc.anims.generateFrameNumbers('syl-idle', {

                }),
                frameRate: 12,

            if (sc.textures.exists('syl-kick') && !sc.anims.exists('syl-kick')) sc.anims.create({
                key: 'syl-kick',

                    start: 0,

                }),

            });
            if (sc.textures.exists('syl-victory1') && !sc.anims.exists('syl-victory1')) sc.anims.create({
                key: 'syl-victory1',
                frames: sc.anims.generateFrameNumbers('syl-victory1', {
                    start: 0,
                    end: 31
                }),
                frameRate: 12,
                repeat: 0
            });
        }


        function resolveSpawnPoint(W, H, spawn) {
            var s = spawn || 'center';
            if (s === 'breakroom') return {
                x: W * 0.60,
                y: H * 0.20
            };
            if (s === 'topCenter') return {
                x: W * 0.50,
                y: H * 0.16
            };
            if (s === 'topRight') return {
                x: W * 0.84,
                y: H * 0.16
            };
            if (s === 'topLeft') return {
                x: W * 0.16,
                y: H * 0.16
            };
            if (s === 'bottomCenter') return {
                x: W * 0.50,
                y: H * 0.80
            };
            if (s === 'bottomRight') return {
                x: W * 0.84,
                y: H * 0.80
            };
            if (s === 'bottomLeft') return {
                x: W * 0.16,
                y: H * 0.80
            };
            if (s === 'leftCenter') return {
                x: W * 0.16,
                y: H * 0.50
            };
            if (s === 'rightCenter') return {
                x: W * 0.84,
                y: H * 0.50
            };
            return {
                x: W * 0.50,
                y: H * 0.50
            };
        }

        function resolvePortalPoint(W, H, door) {
            if (door && typeof door === 'object') {
                return {
                    x: W * (door.x != null ? door.x : 0.50),
                    y: H * (door.y != null ? door.y : 0.50),
                    w: door.w != null ? door.w : 150,
                    h: door.h != null ? door.h : 52
                };
            }

            var d = door || 'center';
            if (d === 'topCenter') return {
                x: W * 0.50,
                y: H * 0.07,
                w: 150,
                h: 52
            };
            if (d === 'topRight') return {
                x: W * 0.88,
                y: H * 0.07,
                w: 150,
                h: 52
            };
            if (d === 'topLeft') return {
                x: W * 0.12,
                y: H * 0.07,
                w: 150,
                h: 52
            };
            if (d === 'bottomCenter') return {
                x: W * 0.50,
                y: H * 0.92,
                w: 150,
                h: 52
            };
            if (d === 'bottomRight') return {
                x: W * 0.88,
                y: H * 0.92,
                w: 150,
                h: 52
            };
            if (d === 'bottomLeft') return {
                x: W * 0.12,
                y: H * 0.92,
                w: 150,
                h: 52
            };
            if (d === 'leftCenter') return {
                x: W * 0.12,
                y: H * 0.50,
                w: 150,
                h: 52
            };
            if (d === 'rightCenter') return {
                x: W * 0.88,
                y: H * 0.50,
                w: 150,
                h: 52
            };
            return {
                x: W * 0.50,
                y: H * 0.50,
                w: 150,
                h: 52
            };
        }

        function createMapRoomScene(cfg) {
            return new Phaser.Class({
                Extends: Phaser.Scene,
                initialize: function() {
                    Phaser.Scene.call(this, {
                        key: cfg.key
                    });
                },
                create: function(data) {
                    this.gs = initGameState(data && data.gs);
                    stampSceneCheckpoint(this.gs, cfg.key, { spawnX: data && data.spawnX, spawnY: data && data.spawnY, spawn: (data && data.spawn) || (cfg.defaultSpawn || 'center') });
                    this.inTrans = false;
                    var sc = this;
                    var W = this.scale.width,
                        H = this.scale.height;
                    // Shared map rooms use a larger world than the viewport so the camera
                    // has room to follow the player the same way it does in Bedroom/Corridor.
                    var WW = W * 1.5,
                        WH = H * 1.5;
                    this.WW = WW;
                    this.WH = WH;
                    var sp = resolveSpawnPoint(WW, WH, (data && data.spawn) || cfg.defaultSpawn || 'center');
                    this.portalReadyAt = this.time.now + 850;

                    if (this.textures.exists(cfg.bgKey)) {
                        var bg = this.add.image(WW / 2, WH / 2, cfg.bgKey).setDepth(0);
                        bg.setScale(Math.min(WW / bg.width, WH / bg.height));
                    } else {
                        this.add.rectangle(0, 0, WW, WH, 0x05020c).setOrigin(0).setDepth(0);
                    }

                    makeAnims(this);
                    this.physics.world.setBounds(0, 0, WW, WH);

                    // Room-specific walls keep the player from walking through furniture
                    // and the non-walkable perimeter in each map background.
                    this.walls = this.physics.add.staticGroup();
                    this._buildWalls(WW, WH, cfg);

                    this.player = this.physics.add.sprite(sp.x, sp.y, 'p-idle' ).setScale(2.1).setDepth(10);
                    if (data && data.spawnX != null && data.spawnY != null) {
                        this.player.setPosition(data.spawnX, data.spawnY);
                        sp = { x: data.spawnX, y: data.spawnY };
                    }
                    this._lastSpawn = { x: sp.x, y: sp.y, spawn: (data && data.spawn) || (cfg.defaultSpawn || 'center') };
                    this.player.setCollideWorldBounds(true);
                    this.player.setBodySize(28, 20, true);
                    this.player.play('p-idle-down' );
                    this.pDir = 'down';
                    this.physics.add.collider(this.player, this.walls);

                    this.portals = [];
                    this.interactables = [];
                    this.activeInteractable = null;
                    this.lastActionAt = 0;
                    this.enemies = this.physics.add.group();

                    (cfg.portals || []).forEach(function(p) {
                        var r = resolvePortalPoint(WW, WH, p.door || p.portal || p.point);
                        var z = sc.add.zone(r.x, r.y, r.w, r.h).setDepth(5);
                        sc.physics.add.existing(z, true);
                        sc.add.text(r.x, r.y, p.label, {
                                fontSize: '13px',
                                fill: '#88ffaa',
                                fontFamily: 'Arial Black',
                                stroke: '#000',
                                strokeThickness: 3
                            })
                            .setOrigin(0.5).setDepth(6);
                        sc.portals.push({
                            zone: z,
                            target: p.target,
                            spawn: p.spawn || 'center'
                        });
                    });

                    this._buildInteractables(WW, WH, cfg);

                    this.keys = this.input.keyboard.addKeys({
                        w: 'W',
                        a: 'A',
                        s: 'S',
                        d: 'D',
                        e: 'E',
                        space: 'SPACE',
                        esc: 'ESC',
                        up: 'UP',
                        down: 'DOWN',
                        left: 'LEFT',
                        right: 'RIGHT'
                    });
                    this.cursors = this.input.keyboard.createCursorKeys();

                    // ─────────────────────────────────────────────────────────────
                    //  INITIALIZE HUD VARIABLES
                    // ─────────────────────────────────────────────────────────────
                    this.UI_LP_W = 200;
                    this.UI_TOP_H = 40;
                    this._buildHUD(W, H, cfg.key, cfg);
                    this._buildActionUI(W, H, cfg);
                    if (Array.isArray(cfg.enemies)) {
                        var sc2 = this;
                        cfg.enemies.forEach(function(en) {
                            spawnMapEnemy(sc2, { x: en.x * WW, y: en.y * WH, id: en.id, roomKey: cfg.key, pool: en.pool || DATA.encounters[0].pool, roamSpeed: en.roamSpeed || 40, range: en.range || 210, fov: en.fov || 70 });
                        });
                        spawnPersistentFollower(sc2, cfg, WW, WH);
                        this.physics.add.collider(this.enemies, this.walls);
                        this.physics.add.overlap(this.player, this.enemies, function(p, e) {
                            if (sc.inTrans || sc.isPaused || e.dead || isDayDefeated(sc.gs, e.enemyId) || (e.cooldownUntil && sc.time.now < e.cooldownUntil)) return;
                            if (e.followPlayer || e.followSticky || String(e.followBehavior || '').toLowerCase() === 'follow' || String(e.followBehavior || '').toLowerCase() === 'strip' || String(e.followBehavior || '').toLowerCase() === 'bed') return;
                            sc.inTrans = true;
                            freezeMapPlayer(sc);
                            if (e.setVelocity) e.setVelocity(0, 0);
                            sc.cameras.main.shake(120, 0.005);
                            var encType = e.encounterType || e.baseEncounterType || getMapEncounterType(sc.gs, e, cfg.key);
                            setMapEnemyMarker(sc, e, encType);
                            playBattleVoiceCue(sc, { kind: 'encounter', gs: sc.gs }, 850);
                            if (encType === 'battle') {
                                startMapBattleEncounter(sc, e);
                            } else if (encType === 'conversation') {
                                showMapConversation(sc, e, cfg.key, function() { sc.inTrans = false; });
                            } else {
                                showMapHscenePrompt(sc, e, cfg.key, function(allowed) { sc.inTrans = false; if (!allowed) restoreMapEventPosition(sc); });
                            }
                        }, null, sc);
                    }
                    this._buildPauseMenu(W, H);
                    this._buildJoystick(W, H);
                    this.cameras.main.setBounds(0, 0, WW, WH);
                    this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
                    this.cameras.main.fadeIn(300, 0, 0, 0);
                },
                update: function(tm) {
                    if (Phaser.Input.Keyboard.JustDown(this.keys.esc)) {
                        this._togglePause();
                    }
                    if (this.enemies) {
                        this.enemies.children.iterate(function(ei) {
                            if (ei && ei.update) ei.update(tm);
                        });
                    }
                    if (this.inTrans || this.isPaused) return;
                    if (Phaser.Input.Keyboard.JustDown(this.keys.e) || Phaser.Input.Keyboard.JustDown(this.keys.space)) {
                        this._triggerCurrentAction();
                    }
                    this.player.setVelocity(0);
                    var spd = 230;
                    // Matches your CorridorScene speed so rooms don't feel slow
                    var mvt = false;
                    var k = this.keys;
                    var joy = this._joy;
                    var joyLeft = joy && joy.active && joy.dx < -0.3;
                    var joyRight = joy && joy.active && joy.dx > 0.3;
                    var joyUp = joy && joy.active && joy.dy < -0.3;
                    var joyDown = joy && joy.active && joy.dy > 0.3;
                    var goLeft = k.a.isDown || this.cursors.left.isDown || joyLeft;
                    var goRight = k.d.isDown || this.cursors.right.isDown || joyRight;
                    var goUp = k.w.isDown || this.cursors.up.isDown || joyUp;
                    var goDown = k.s.isDown || this.cursors.down.isDown || joyDown;
                    if (goLeft) {
                        this.player.setVelocityX(-spd);
                        mvt = true;
                    } else if (goRight) {
                        this.player.setVelocityX(spd);
                        mvt = true;
                    }
                    if (goUp) {
                        this.player.setVelocityY(-spd);
                        mvt = true;
                    } else if (goDown) {
                        this.player.setVelocityY(spd);
                        mvt = true;
                    }
                    if (goLeft || goRight || goUp || goDown) {
                        var absX = joy && joy.active ? Math.abs(joy.dx) : (goLeft || goRight ? 1 : 0);
                        var absY = joy && joy.active ? Math.abs(joy.dy) : (goUp || goDown ? 1 : 0);
                        if (absX >= absY) {
                            this.pDir = goLeft ? 'left' : 'right';
                        } else {
                            this.pDir = goUp ? 'up' : 'down';
                        }
                    }
                    this.player.play((mvt ? 'p-walk-' : 'p-idle-') + this.pDir, true);
                    this.player.setDepth(20 + this.player.y * 0.001);
                    this._updateInteractables();

                    if ((this.gs.sta || 0) <= 0 && !this.inTrans) {
                        triggerMapSleepCollapse(this);
                        return;
                    }

                    for (var i = 0; i < this.portals.length; i++) {
                        var p = this.portals[i];
                        if (this.time.now < this.portalReadyAt) continue;
                        if (this.physics.overlap(this.player, p.zone)) {
                            this.inTrans = true;
                            this.portalReadyAt = this.time.now + 850;
                            this.player.setVelocity(0, 0);
                            this.cameras.main.fadeOut(250, 0, 0, 0);
                            var dest = p.target,
                                spawn = p.spawn,
                                gs = this.gs,
                                scene = this;
                            this.time.delayedCall(300, function() {
                                scene.scene.start(dest, {
                                    gs: gs,
                                    spawn: spawn
                                });
                            });
                            break;
                        }
                    }
                },

                _buildWalls: function(WW, WH, cfg) {
                    var sc = this;
                    var rects = (cfg && cfg.wallRects) || [];
                    rects.forEach(function(r) {
                        var x = r[0] * WW,
                            y = r[1] * WH,
                            w = r[2] * WW,
                            h = r[3] * WH;
                        var wall = sc.walls.create(x + w / 2, y + h / 2, null)
                            .setVisible(false)
                            .refreshBody();
                        wall.setSize(w, h);
                        wall.refreshBody();
                    });
                },

                _buildInteractables: function(WW, WH, cfg) {
                    var sc = this;
                    var acts = (cfg && cfg.actions) || [];
                    acts.forEach(function(a) {
                        if (!a || !a.zone) return;
                        var x = a.zone[0] * WW,

                _togglePause: function() {
                    this.isPaused = !this.isPaused;
                    syncPauseUIVisibility(this, this.isPaused);
                    if (this.isPaused && this._perkMenuOpen && this._closePerkMenu) {
                        this._closePerkMenu();
                    }
                    if (this.isPaused) {
                        this.physics.pause();
                        this.anims.globalTimeScale = 0;
                        if (this._joyObjs) this._joyObjs.forEach(function(o) {
                            o.setVisible(false);
                        });
                        if (this._joy) {
                            this._joy.active = false;
                            this._joy.dx = 0;
                            this._joy.dy = 0;
                        }

                    } else {
                        this.physics.resume();
                        this.anims.globalTimeScale = 1;
                        if (this._joyObjs) this._joyObjs.forEach(function(o) {
                            o.setVisible(true);
                        });

                    }
                },

                _buildJoystick: function(W, H) {
                    var R_BASE = 60,
                        R_KNOB = 26;
                    var lpW = this.UI_LP_W || 200;
                    var cx = lpW / 2,
                        cy = H - 210;


                    var base = this.add.graphics().setDepth(500).setScrollFactor(0).setAlpha(0.35);
                    base.lineStyle(3, 0xc8a0d0, 1);
                    base.strokeCircle(cx, cy, R_BASE);
                    base.fillStyle(0x160d28, 0.5);
                    base.fillCircle(cx, cy, R_BASE);

                    var arr = this.add.graphics().setDepth(501).setScrollFactor(0).setAlpha(0.45);
                    arr.lineStyle(2, 0xc8a0d0, 1);
                    [
                        [cx, cy - R_BASE + 10, cx, cy - R_BASE + 22],
                        [cx, cy + R_BASE - 10, cx, cy + R_BASE - 22],
                        [cx - R_BASE + 10, cy, cx - R_BASE + 22, cy],
                        [cx + R_BASE - 10, cy, cx + R_BASE - 22, cy]
                    ].forEach(function(l) {
                        arr.lineBetween(l[0], l[1], l[2], l[3]);
                    });

                    var knob = this.add.graphics().setDepth(502).setScrollFactor(0).setAlpha(0.7);
                    knob.fillStyle(0x9b59b6, 1);
                    knob.fillCircle(0, 0, R_KNOB);
                    knob.lineStyle(2, 0xc8a0d0, 1);
                    knob.strokeCircle(0, 0, R_KNOB);
                    knob.x = cx;
                    knob.y = cy;

                    this._joy = {
                        active: false,
                        pid: -1,
                        bx: cx,
                        by: cy,
                        dx: 0,
                        dy: 0
                    };
                    var joy = this._joy;
                    var hit = this.add.circle(cx, cy, R_BASE + 10).setDepth(499).setScrollFactor(0).setAlpha(0.001).setInteractive();

                    this.input.on('pointerdown', function(ptr) {
                        var dx = ptr.x - cx,
                            dy = ptr.y - cy;
                        if (!joy.active && Math.sqrt(dx * dx + dy * dy) <= R_BASE + 15) {
                            joy.active = true;
                            joy.pid = ptr.id;
                        }
                    });
                    this.input.on('pointermove', function(ptr) {
                        if (!joy.active || ptr.id !== joy.pid) return;
                        var dx = ptr.x - cx,
                            dy = ptr.y - cy,
                            dist = Math.sqrt(dx * dx + dy * dy),
                            clamped = Math.min(dist, R_BASE);
                        var nx = dist > 0 ? dx / dist : 0,
                            ny = dist > 0 ? dy / dist : 0;
                        knob.x = cx + nx * clamped;
                        knob.y = cy + ny * clamped;
                        joy.dx = nx * Math.min(dist / R_BASE, 1);
                        joy.dy = ny * Math.min(dist / R_BASE, 1);
                    });
                    var resetJoy = function(ptr) {
                        if (ptr && ptr.id !== joy.pid) return;
                        joy.active = false;
                        joy.pid = -1;
                        joy.dx = 0;
                        joy.dy = 0;
                        knob.x = cx;
                        knob.y = cy;
                    };
                    this.input.on('pointerup', resetJoy);
                    this.input.on('pointerupoutside', resetJoy);
                    this._joyObjs = [base, arr, knob, hit];
                }
            });
        }

            _buildJoystick: function(W, H) {
                var R_BASE = 60,
                    R_KNOB = 26,
                    cx = this.UI_LP_W / 2,
                    cy = H - 210;
                var base = this.add.graphics().setDepth(500).setScrollFactor(0).setAlpha(0.35);
                base.lineStyle(3, 0xc8a0d0, 1);
                base.strokeCircle(cx, cy, R_BASE);
                base.fillStyle(0x160d28, 0.5);
                base.fillCircle(cx, cy, R_BASE);
                var arr = this.add.graphics().setDepth(501).setScrollFactor(0).setAlpha(0.45);
                arr.lineStyle(2, 0xc8a0d0, 1);
                [
                    [cx, cy - R_BASE + 10, cx, cy - R_BASE + 22],
                    [cx, cy + R_BASE - 10, cx, cy + R_BASE - 22],
                    [cx - R_BASE + 10, cy, cx - R_BASE + 22, cy],
                    [cx + R_BASE - 10, cy, cx + R_BASE - 22, cy]
                ].forEach(function(l) {
                    arr.lineBetween(l[0], l[1], l[2], l[3]);
                });
                var knob = this.add.graphics().setDepth(502).setScrollFactor(0).setAlpha(0.7);
                knob.fillStyle(0x9b59b6, 1);
                knob.fillCircle(0, 0, R_KNOB);
                knob.lineStyle(2, 0xc8a0d0, 1);
                knob.strokeCircle(0, 0, R_KNOB);
                knob.x = cx;
                knob.y = cy;
                this._joy = {
                    active: false,
                    pid: -1,
                    bx: cx,
                    by: cy,
                    dx: 0,
                    dy: 0
                };
                var joy = this._joy;
                var hit = this.add.circle(cx, cy, R_BASE + 10).setDepth(499).setScrollFactor(0).setAlpha(0.001).setInteractive();
                this.input.on('pointerdown', function(ptr) {
                    var dx = ptr.x - cx,
                        dy = ptr.y - cy;
                    if (!joy.active && Math.sqrt(dx * dx + dy * dy) <= R_BASE + 15) {
                        joy.active = true;
                        joy.pid = ptr.id;
                    }
                });
                this.input.on('pointermove', function(ptr) {
                    if (!joy.active || ptr.id !== joy.pid) return;
                    var dx = ptr.x - cx,
                        dy = ptr.y - cy,
                        dist = Math.sqrt(dx * dx + dy * dy),
                        clamped = Math.min(dist, R_BASE);
                    var nx = dist > 0 ? dx / dist : 0,
                        ny = dist > 0 ? dy / dist : 0;
                    knob.x = cx + nx * clamped;
                    knob.y = cy + ny * clamped;
                    joy.dx = nx * Math.min(dist / R_BASE, 1);
                    joy.dy = ny * Math.min(dist / R_BASE, 1);
                });
                var resetJoy = function(ptr) {
                    if (ptr && ptr.id !== joy.pid) return;
                    joy.active = false;
                    joy.pid = -1;
                    joy.dx = 0;
                    joy.dy = 0;
                    knob.x = cx;
                    knob.y = cy;
                };
                this.input.on('pointerup', resetJoy);
                this.input.on('pointerupoutside', resetJoy);
                this._joyObjs = [base, arr, knob, hit];
            },

            update: function(tm) {
                if (Phaser.Input.Keyboard.JustDown(this.keys.esc)) {
                    this._togglePause();
                }
                if (this.isPaused || this.inTrans) return;

                this.player.setVelocity(0);
                var sp = 230;
                var mvt = false;
                var k = this.keys;
                var joy = this._joy;
                var joyLeft = joy && joy.active && joy.dx < -0.3,
                    joyRight = joy && joy.active && joy.dx > 0.3;
                var joyUp = joy && joy.active && joy.dy < -0.3,
                    joyDown = joy && joy.active && joy.dy > 0.3;
                var goLeft = k.a.isDown || this.cursors.left.isDown || joyLeft;
                var goRight = k.d.isDown || this.cursors.right.isDown || joyRight;
                var goUp = k.w.isDown || this.cursors.up.isDown || joyUp;
                var goDown = k.s.isDown || this.cursors.down.isDown || joyDown;
                if (goLeft) {
                    this.player.setVelocityX(-sp);
                    mvt = true;
                } else if (goRight) {
                    this.player.setVelocityX(sp);
                    mvt = true;
                }
                if (goUp) {
                    this.player.setVelocityY(-sp);
                    mvt = true;
                } else if (goDown) {
                    this.player.setVelocityY(sp);
                    mvt = true;
                }
                if (goLeft || goRight || goUp || goDown) {
                    var absX = joy && joy.active ? Math.abs(joy.dx) : (goLeft || goRight ? 1 : 0);
                    var absY = joy && joy.active ? Math.abs(joy.dy) : (goUp || goDown ? 1 : 0);
                    if (absX >= absY) {
                        this.pDir = goLeft ? 'left' : 'right';
                    } else {
                        this.pDir = goUp ? 'up' : 'down';
                    }
                }
                this.player.play((mvt ? 'p-walk-' : 'p-idle-') + this.pDir, true);
                this.player.setDepth(20 + this.player.y * 0.001);

                // ── Bed proximity prompt ───────────────────────────────────
                var nearBed = this.bedZone && this.physics.overlap(this.player, this.bedZone);
                if (this.bedPrompt) this.bedPrompt.setVisible(nearBed);
                if (this.bedButton) this.bedButton.setVisible(nearBed);

                if (nearBed && !this.inTrans) {
                    var canSleep = Phaser.Input.Keyboard.JustDown(this.keys.e) ||
                        (this._joy && this._joy.active === false && this._lastNearBed && this.input.activePointer.justDown);
                    this._lastNearBed = nearBed;
                    if (canSleep) this._doSleep();
                } else {
                    this._lastNearBed = false;
                }

                // ── Corridor portal ────────────────────────────────────────
                if (!this.inTrans && this.corridorPortal && this.physics.overlap(this.player, this.corridorPortal)) {
                    this.inTrans = true;
                    this.player.setVelocity(0, 0);
                    this.cameras.main.fadeOut(300, 0, 0, 0);
                    var sc = this;
                    this.time.delayedCall(350, function() {
                        sc.scene.start('Corridor', {
                            gs: sc.gs,
                            spawn: { x: 0.50, y: 0.18 }
                        });
                    });
                }
            },

            // ── Sleep / New Day ───────────────────────────────────────────
            _doSleep: function() {
                if (this.inTrans) return;
                this.inTrans = true;
                var sc = this,
                    g = this.gs;
                var totalDes = ((g.desires.m || 0) + (g.desires.c || 0) + (g.desires.p || 0) + (g.desires.a || 0));
                var follower = g.mapFollower && g.mapFollower.active ? g.mapFollower : null;
                var followerBedVisit = !!(follower && String(follower.behavior || '').toLowerCase() === 'bed');
                var sleepScene = 'SLEEP';
                if (followerBedVisit) {
                    sleepScene = corruptionAverage(g) >= 18 ? 'SLEEP_GROPE' : 'SLEEP_P2';
                }
                var useSleepScene = (totalDes > 0 || followerBedVisit) && this.textures.exists('sc-' + sleepScene);

                if (useSleepScene) {
                    this.scene.start('SceneViewer', {
                        gs: g,
                        scKey: sleepScene,
                        toSleep: true,
                        nightVisit: followerBedVisit
                    });
                    return;
                }

                // Restore vitals and clothing; corruption stays intact.
                advanceDayState(g);
                g.hp = g.maxHp;
                g.sta = g.maxSta;
                g.wil = g.maxWil;
                g.desires = {
                    m: 0,
                    c: 0,
                    p: 0,
                    a: 0
                };
                g.outfitLock = null; // outfit resets each morning

                playVoiceCue(this, 'idle', 0);
                SV.write(g);
                try {
                    localStorage.setItem('ws_local', JSON.stringify(g));
                } catch (e) {}

                // Fade + transition text
                this.cameras.main.flash(300, 255, 255, 180);
                this.add.text(this.scale.width / 2, this.scale.height / 2,
                        'Day ' + g.day + ' - You slept soundly. Stats restored.', {
                            fontSize: '24px',
                            fill: '#ffe066',
                            fontFamily: 'Georgia',
                            fontStyle: 'italic',
                            stroke: '#000',
                            strokeThickness: 4
                        })
                    .setOrigin(0.5).setScrollFactor(0).setDepth(500);

                this.time.delayedCall(2200, function() {
                    sc.cameras.main.fadeOut(400, 0, 0, 0);
                    sc.time.delayedCall(450, function() {
                        // Restart bedroom with fresh day (player wakes up here)
                        sc.scene.start('Bedroom', {
                            gs: g,
                            newDay: true
                        });
                    });
                });
            }
        });

        // ─────────────────────────────────────────────────────────────
        //  CORRIDOR MAP 
        // ─────────────────────────────────────────────────────────────
        /*
          bg-corridors.png is ~1080×720 (landscape corridor map)
          We render it at WW×WH = 2×screen = 2560×1440.
          Walkable zone (green in reference image 2):
            roughly the centre cross-shape of corridors.
          Non-walkable (red): outer walls and cell block interiors.
          We approximate with a static body wall grid.

          DOOR to Bedroom (X in image 2): bottom-centre of map.
          PLAYER enters from top of that door (O in image 2).
        */
        var CorridorScene = new Phaser.Class({
            Extends: Phaser.Scene,
            initialize: function() {
                Phaser.Scene.call(this, {
                    key: 'Corridor'
                });
            },
            create: function(data) {
                this.gs = initGameState(data.gs);
                stampSceneCheckpoint(this.gs, 'Corridor', { spawnX: data && data.spawnX, spawnY: data && data.spawnY, spawn: (data && data.spawn) || 'topCenter' });
                this.inTrans = false;
                var sc = this;

                var W = this.scale.width,
                    H = this.scale.height;
                // Map is 2× the viewport
                var WW = W * 2,
                    WH = H * 2;
                this.WW = WW;
                this.WH = WH;

                if (this.textures.exists('map-bg')) {
                    var bi = this.add.image(WW / 2, WH / 2, 'map-bg').setDepth(0);
                    bi.setScale(Math.max(WW / bi.width, WH / bi.height));
                }
                makeAnims(this);
                this.physics.world.setBounds(0, 0, WW, WH);

                // ── Walkable zone for Corridor ────────────────────────────
                // Based on image 2: a cross-shaped green corridor.
                // Non-walkable walls are placed as static physics bodies.
                // All measurements are fractions of WW/WH for scalability.
                this.walls = this.physics.add.staticGroup();
                this._buildWalls(WW, WH);

                // ── Player spawn based on the doorway used to enter ──────
                var spawnPoint = resolveSpawnPoint(WW, WH, (data && data.spawn) || 'topCenter');
                var spawnX = (data && data.spawnX != null) ? data.spawnX : spawnPoint.x;
                var spawnY = (data && data.spawnY != null) ? data.spawnY : spawnPoint.y;
                this.player = this.physics.add.sprite(spawnX, spawnY, 'p-idle').setScale(2.1).setDepth(10);
                this._lastSpawn = { x: spawnX, y: spawnY, spawn: (data && data.spawn) || 'topCenter' };
                this.player.setCollideWorldBounds(true);
                this.player.setBodySize(28, 20, true);
                this.player.play('p-idle-down');
                this.pDir = 'down';

                this.physics.add.collider(this.player, this.walls);

                // ── Portals ───────────────────────────────────────────────
                var p1 = resolvePortalPoint(WW, WH, 'topCenter');
                this.bedroomPortal = this.add.zone(p1.x, p1.y, p1.w, p1.h).setDepth(5);
                this.physics.add.existing(this.bedroomPortal, true);
                this.add.text(p1.x, p1.y, '[ TO BEDROOM ]', {
                        fontSize: '13px',
                        fill: '#88ffaa',

            _triggerCurrentAction: function() {

            _updateInteractables: function() {
                var found = null;
                for (var i = 0; i < this.interactables.length; i++) {
                    var it = this.interactables[i];
                    if (this.physics.overlap(this.player, it.zone)) {
                        found = it;
                        break;
                    }

                if (found !== this.activeInteractable) {
                    this.activeInteractable = found;
                    this._updateActionUI();
                }

                    [0, 0, 0.05, 1.0], // left
                    [0.95, 0, 0.05, 1.0], // right

                    // ── Upper-left cell block ──────────────────────────────
                    [0.05, 0.06, 0.18, 0.22],
                    // ── Upper-right cell block ─────────────────────────────
                    [0.77, 0.06, 0.18, 0.22],
                    // ── Upper-centre walls (between north cells) ───────────
                    [0.23, 0.06, 0.10, 0.10],
                    [0.67, 0.06, 0.10, 0.10],

                    // ── Middle-left cell blocks ────────────────────────────
                    [0.05, 0.32, 0.18, 0.30],
                    // ── Middle-right cell blocks ───────────────────────────
                    [0.77, 0.32, 0.18, 0.30],

                    // ── Lower-right cell block ─────────────────────────────
                    [0.77, 0.66, 0.18, 0.22],

                    [0.05, 0.70, 0.33, 0.24],

                ];
                rects.forEach(function(r) {
                    var x = r[0] * WW,

                    var wall = sc.walls.create(x + w / 2, y + h / 2, null)

            _buildJoystick: function(W, H) {
                var R_BASE = 60,
                    R_KNOB = 26;
                var cx = this.UI_LP_W / 2,
                    cy = H - 210;

                var base = this.add.graphics().setDepth(500).setScrollFactor(0).setAlpha(0.35);
                base.lineStyle(3, 0xc8a0d0, 1);
                base.strokeCircle(cx, cy, R_BASE);
                base.fillStyle(0x160d28, 0.5);
                base.fillCircle(cx, cy, R_BASE);

                var arr = this.add.graphics().setDepth(501).setScrollFactor(0).setAlpha(0.45);
                arr.lineStyle(2, 0xc8a0d0, 1);
                [
                    [cx, cy - R_BASE + 10, cx, cy - R_BASE + 22],
                    [cx, cy + R_BASE - 10, cx, cy + R_BASE - 22],
                    [cx - R_BASE + 10, cy, cx - R_BASE + 22, cy],
                    [cx + R_BASE - 10, cy, cx + R_BASE - 22, cy]
                ].forEach(function(l) {
                    arr.lineBetween(l[0], l[1], l[2], l[3]);
                });

                var knob = this.add.graphics().setDepth(502).setScrollFactor(0).setAlpha(0.7);
                knob.fillStyle(0x9b59b6, 1);
                knob.fillCircle(0, 0, R_KNOB);
                knob.lineStyle(2, 0xc8a0d0, 1);
                knob.strokeCircle(0, 0, R_KNOB);
                knob.x = cx;
                knob.y = cy;

                this._joy = {
                    active: false,
                    pid: -1,
                    bx: cx,
                    by: cy,
                    dx: 0,
                    dy: 0
                };
                var joy = this._joy;
                var hit = this.add.circle(cx, cy, R_BASE + 10).setDepth(499).setScrollFactor(0).setAlpha(0.001).setInteractive();

                this.input.on('pointerdown', function(ptr) {
                    var dx = ptr.x - cx,
                        dy = ptr.y - cy;
                    if (!joy.active && Math.sqrt(dx * dx + dy * dy) <= R_BASE + 15) {
                        joy.active = true;
                        joy.pid = ptr.id;
                    }
                });
                this.input.on('pointermove', function(ptr) {
                    if (!joy.active || ptr.id !== joy.pid) return;
                    var dx = ptr.x - cx,
                        dy = ptr.y - cy,
                        dist = Math.sqrt(dx * dx + dy * dy),
                        clamped = Math.min(dist, R_BASE);
                    var nx = dist > 0 ? dx / dist : 0,
                        ny = dist > 0 ? dy / dist : 0;
                    knob.x = cx + nx * clamped;
                    knob.y = cy + ny * clamped;
                    joy.dx = nx * Math.min(dist / R_BASE, 1);
                    joy.dy = ny * Math.min(dist / R_BASE, 1);
                });
                var resetJoy = function(ptr) {
                    if (ptr && ptr.id !== joy.pid) return;
                    joy.active = false;
                    joy.pid = -1;
                    joy.dx = 0;
                    joy.dy = 0;
                    knob.x = cx;
                    knob.y = cy;
                };
                this.input.on('pointerup', resetJoy);
                this.input.on('pointerupoutside', resetJoy);
                this._joyObjs = [base, arr, knob, hit];
            },

            _buildPauseMenu: function(W, H) {
                this.pauseUI = [];

                var hudObjs = this.hudObjects;

                function ph(obj) {
                    obj.setScrollFactor(0);
                    hudObjs.push(obj);
                    return obj;
                }

                this.pauseUI.push(ph(this.add.rectangle(W / 2, H / 2, W, H, 0x000, 0.85).setDepth(9999).setOrigin(0.5).setVisible(false).setInteractive()));
                this.pauseUI.push(ph(this.add.rectangle(W / 2, H / 2, 400, 360, 0x150b28).setStrokeStyle(3, 0x8a2be2).setDepth(9999).setVisible(false)));
                var pTitle = ph(this.add.text(W / 2, H / 2 - 140, 'PAUSED', {
                    fontSize: '30px',
                    fill: '#8ac4ff',
                    fontFamily: 'Georgia'
                }).setOrigin(0.5).setDepth(9999).setVisible(false));
                this.pauseUI.push(pTitle);

                var cmds = [{
                        t: 'Resume',
                        fn: function() {
                            sc._togglePause();
                        }
                    },
                    {
                        t: 'Save Data',
                        fn: function() {
                            pTitle.setText('SAVING...');
                            var payload = captureSaveData(sc);
                            SV.write(payload, function(sr) {
                                pTitle.setText(sr && sr.ok ? 'SAVED!' : 'SAVED LOCAL');
                                setTimeout(function() {
                                    if (pTitle) pTitle.setText('PAUSED');
                                }, 1200);
                            });
                        }
                    },
                    {
                        t: 'Load Data',
                        fn: function() {
                            pTitle.setText('LOADING...');
                            SV.read(function(res) {
                                var d = res;
                                if (!d) {
                                    try {
                                        d = JSON.parse(localStorage.getItem('ws_local'));
                                    } catch (e) {}
                                }
                                if (d) {
                                    sc.gs = initGameState(d);
                                    sc._refreshHUD();
                                    pTitle.setText('LOADED!');
                                } else {
                                    pTitle.setText('NO DATA!');
                                }
                                setTimeout(function() {
                                    if (pTitle) pTitle.setText('PAUSED');
                                }, 1500);
                            });
                        }
                    },
                    {
                        t: 'Main Menu',
                        fn: function() {
                            sc.scene.start('Title');
                        }
                    }
                ];
                cmds.forEach(function(c, i) {
                    var btn = ph(sc.add.text(W / 2, H / 2 - 40 + (i * 60), c.t, {

                        fill: '#ddd',
                        fontFamily: 'Georgia'
                    }).setOrigin(0.5).setInteractive({
                        useHandCursor: true
                    }).setDepth(9999).setVisible(false));

                    btn.on('pointerover', function() {
                        btn.setColor('#d4af37');
                    });
                    btn.on('pointerout', function() {
                        btn.setColor('#ddd');
                    });
                    sc.pauseUI.push(btn);
                });

            _togglePause: function() {
                this.isPaused = !this.isPaused;
                syncPauseUIVisibility(this, this.isPaused);
                if (this.isPaused) {
                    this.physics.pause();
                    this.anims.globalTimeScale = 0;
                    if (this._joyObjs) this._joyObjs.forEach(function(o) {
                        o.setVisible(false);
                    });
                    if (this._joy) {
                        this._joy.active = false;
                        this._joy.dx = 0;
                        this._joy.dy = 0;
                    }
                } else {
                    this.physics.resume();
                    this.anims.globalTimeScale = 1;
                    if (this._joyObjs) this._joyObjs.forEach(function(o) {
                        o.setVisible(true);
                    });
                }
            },

            _refreshHUD: function() {
                var g = this.gs;
                fitToBox(this, this.port, 'portrait-' + getPortraitState(g), this.UI_LP_W - 4, 420);
                fitToBox(this, this.faceImg, 'face-neutral', this.UI_LP_W - 10, 130);

                if (this.hpBar) {
                    this.hpBar.clear().fillStyle(0xe94560, 1).fillRect(380, 10, 200 * (Math.max(0, g.hp) / g.maxHp), 20);
                    this.hpTxt.setText(Math.ceil(g.hp) + '/' + g.maxHp);
                }
                if (this.staBar) {
                    this.staBar.clear().fillStyle(0x44aaff, 1).fillRect(650, 10, 200 * (Math.max(0, g.sta) / g.maxSta), 20);
                    this.staTxt.setText(Math.ceil(g.sta) + '/' + g.maxSta);
                }
                if (this.wilBar) {
                    this.wilBar.clear().fillStyle(0xffaa00, 1).fillRect(920, 10, 200 * (Math.max(0, g.wil) / g.maxWil), 20);
                    this.wilTxt.setText(Math.ceil(g.wil) + '/' + g.maxWil);
                }
                if (this.stanceText) {
                    var st = getStanceLabel(g, this.pState);
                    this.stanceText.setText(st.lbl).setColor(st.color);
                }

                    this.enemies.children.iterate(function(ei) {
                        if (ei && ei.update) ei.update(tm);

                }
                if (this.isPaused || this.inTrans) return;
                if (Phaser.Input.Keyboard.JustDown(this.keys.e) || Phaser.Input.Keyboard.JustDown(this.keys.space)) {
                    this._triggerCurrentAction();

                this.player.setVelocity(0);
                var sp = 230;

                var joyRight = joy && joy.active && joy.dx > 0.3;
                var joyUp = joy && joy.active && joy.dy < -0.3;
                var joyDown = joy && joy.active && joy.dy > 0.3;

                var goLeft = k.a.isDown || this.cursors.left.isDown || joyLeft;
                var goRight = k.d.isDown || this.cursors.right.isDown || joyRight;
                var goUp = k.w.isDown || this.cursors.up.isDown || joyUp;
                var goDown = k.s.isDown || this.cursors.down.isDown || joyDown;

                if (goLeft) {
                    this.player.setVelocityX(-sp);

                    mvt = true;

                if (goUp) {

                    mvt = true;
                } else if (goDown) {
                    this.player.setVelocityY(sp);
                    mvt = true;
                }

                if (goLeft || goRight || goUp || goDown) {

                    var absY = joy && joy.active ? Math.abs(joy.dy) : (goUp || goDown ? 1 : 0);
                    if (absX >= absY) {
                        this.pDir = goLeft ? 'left' : 'right';

                        this.pDir = goUp ? 'up' : 'down';

            _buildStage: function(W, H) {

                this.P_Y = 480;
                this.E_X = this.Z.LP + sW * 0.75;
                this.E_Y = 480;

                var tex = this.textures.exists('syl-idle') ? 'syl-idle' : 'p-idle';
                this.pSpr = this.add.sprite(this.P_X, this.P_Y, tex).setOrigin(0.5, 1).setDepth(10);
                if (this.anims.exists('syl-idle')) {
                    this.pSpr.play('syl-idle');
                    this.pSpr.setScale(2.1);
                } else if (this.anims.exists('p-idle-right')) {
                    this.pSpr.play('p-idle-right');
                    this.pSpr.setScale(2.75);
                }

                var eTex = this.textures.exists('m-idle') ? 'm-idle' : '__DFL';
                this.eSprites = [];
                for (var i = 0; i < this.eCount; i++) {
