<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sylphiette: Warden of Subversion</title>
    <link rel="stylesheet" href="css/ui-overlay.css">
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0b10;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script type="module">
        import { GameEngine } from './src/game.js';
        window.addEventListener('DOMContentLoaded', () => {
            GameEngine.init();
        });
    </script>
</body>
</html>
